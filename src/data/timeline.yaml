# Timeline Configuration
# Controls the presentation flow - 60 minutes total
# Reveals are in narrative order — characters & epics first to set the scene,
# then challenges & concepts build on them. Order in the array = reveal order.
# Each reveal can optionally define two explicit script beats for the controls:
#   modalStep  — shown while the detail modal is on screen
#   globalStep — shown after the card is placed back into the dashboard

presentation:
  totalDuration: 60 # minutes
  segments:
    - id: intro
      title: "The Phoenix Project"
      subtitle: "A Novel About IT, DevOps, and Helping Your Business Win"
      start: "00:00"
      end: "05:00"
      phase: intro
      pageScript: >-
        Parts Unlimited is a four-billion-dollar company that is losing market share,
        bleeding confidence on Wall Street, and running out of time. The board has
        forced leadership changes. The competition keeps shipping capabilities that Parts
        Unlimited cannot match. And the company has staked its survival on one giant
        transformation program called Phoenix, which is already years late. This is the
        story of how that pressure collides with an IT organisation that cannot yet see
        the system it is trying to run.
      narrativeArc: >-
        A struggling retailer bets its future on one giant program while the systems
        underneath it are already straining.
      reveals: []

    - id: segment-1
      title: "The Week Everything Breaks"
      subtitle: "Bill inherits a failing system, and three crises land at once"
      start: "05:00"
      end: "15:00"
      phase: early
      pageScript: >-
        It is a Tuesday morning in September. Bill Palmer is driving to work at Parts
        Unlimited, thinking about network outages and his three-year-old son's doctor
        appointment, when the Vice President of Human Resources calls and asks him to
        come in immediately. Bill assumes he is about to be fired.
      contentSetupScript: |-
        He is not about to be fired. He is about to be promoted into the worst job in the company. And over the next few days he will be hit by a payroll failure, a Phoenix showdown, and a crushing audit report that all point to the same underlying problem.
      narrativeArc: >-
        One routine morning becomes the day Bill is summoned upstairs, handed the reins,
        and watches the first crises detonate.
      takeaway: >-
        The opening failures are not isolated mistakes. They are the symptoms of a system
        with no visibility, brittle knowledge silos, and promises being made long before
        capacity and readiness are understood.
      summary: >-
        Bill's first days teach those opening lessons the hard way. Reliability failures
        become business crises immediately. Changes nobody can see cannot be governed.
        Knowledge trapped in Brent makes every emergency more dangerous, business leaders keep
        committing to Phoenix without understanding operational reality, and trust in IT keeps
        eroding with every miss. Phoenix plus the audit show that the company is suffering from
        systemic governance debt, not one isolated mistake.
      reveals:
        - type: "character"
          id: "bill-palmer"
          modalStep:
            name: "Meet Bill Palmer"
            script: |-
              Bill Palmer is the director of midrange technology operations. He is an ex-Marine, proud of the tight team he has built over ten years, and he has absolutely no ambition to become one of those executives who spend all day in meetings and PowerPoint reviews. 
          globalStep:
            name: "Bill before the promotion"
            script: |-
              HR walks Bill to the CEO's floor and into Steve Masters' office. 
        - type: "character"
          id: "steve-masters"
          modalStep:
            name: "Meet Steve Masters"
            script: |-
              Steve is a former Army major, direct, calm, and already under extraordinary pressure. He tells Bill that the CIO and Bill's boss are both gone. Then he lays out the stakes: the stock is down, the board is losing patience, and he has roughly six months to turn things around or four thousand people may lose their jobs.
          globalStep:
            name: "Steve sets the stakes"
            script: |-
              Steve is not congratulating Bill or offering him a prize. He is telling him that the company is in trouble, Phoenix is late, and leadership is out of time.
        - type: "quote"
          id: "bill-talked-into-job"
          modalStep:
            name: "Bill realises what just happened"
            script: |-
              Steve looks Bill in the eye and says, I need you to help me save this great company. Can I count on you? Bill says yes, and the moment he leaves the office he realises he has just accepted a job he never wanted.
          globalStep:
            name: "Reluctance becomes responsibility"
            script: |-
              Steve tells Bill that Phoenix is essential to the company's survival. 
        - type: "epic"
          id: "phoenix-project"
          modalStep:
            name: "The project that carries the company"
            script: |-
              Phoenix is the big omni-channel transformation that is supposed to let customers buy wherever they want, in stores or online. It is already years late, investors are howling, and the entire company has started to behave as if Phoenix must ship no matter what else breaks.
          globalStep:
            name: "Phoenix becomes the lens"
            script: |-
              From this point forward, every outage, shortcut, and delay becomes more dangerous, because the business believes Phoenix is the program that will save everything else.
        - type: "epic"
          id: "payroll-failure"
          modalStep:
            name: "Payroll fails on Bill's first day"
            script: |-
              Before Bill can even figure out where his new office is, Steve hands him an email from Dick Landry, the CFO. Payroll is failing. Hourly employees' records are corrupted. If the issue is not fixed by five PM, thousands of workers may miss their paychecks, the union may erupt, and the company will be on the front page for all the wrong reasons.
          globalStep:
            name: "The first crisis is already live"
            script: |-
              So Bill's first act as vice president is not strategy, budgeting, or planning. It is emergency triage with real people's mortgages and groceries on the line. Bill makes his way to the payroll war room.
        - type: "character"
          id: "patty-mckee"
          modalStep:
            name: "Meet Patty McKee"
            script: |-
              In the payroll war room, Bill meets Patty McKee. Patty is quiet, precise, and methodical. She runs IT Service Support and becomes the person who can turn a room full of anxiety into something that looks like a process. She is not introduced as an abstract champion of discipline. She first appears in the middle of a live business crisis, trying to bring order to chaos.
          globalStep:
            name: "Patty starts to make chaos legible"
            script: |-
              Patty's first impression matters. She is not there to add more bureaucracy. She is there to give Bill a way to see the work clearly enough to manage it.
        - type: character
          id: wes-davis
          modalStep:
            name: "Meet Wes Davis"
            script: >-
              Wes Davis arrives with all the energy of a man who has been fighting outages
              for too long. He is loud, skeptical, overloaded, and immediately hostile to Bill's
              promotion. But Wes also gives the crisis its texture. He is already living inside
              the escalations and impossible handoffs that the rest of the company only
              notices when something explodes.
          globalStep:
            name: "Wes embodies the firefighting culture"
            script: >-
              With Wes on the board, the crisis becomes human. The organisation is staying
              upright by exhausting people until the exhaustion starts to look normal.

        - type: character
          id: brent-geller
          modalStep:
            name: "Meet Brent Geller"
            script: >-
              During payroll and the storage crisis that follows, one name keeps surfacing:
              Brent. Brent Geller is the engineer everyone depends on. He sits in a six-cubicle
              command centre surrounded by monitors, and every critical path seems to run
              through him. The vendors cannot fix the SAN without him. The teams cannot move
              without him. Even Bill starts asking, Brent, Brent, Brent. Can't we do anything
              without him?
          globalStep:
            name: "The system now has a face"
            script: >-
              Brent is not introduced as a hero to celebrate. He is introduced as evidence
              that the system is dangerously concentrated in one person's head.

        - type: challenge
          id: knowledge-silos
          modalStep:
            name: "Critical knowledge is trapped in too few people"
            script: >-
              Brent is not just busy. He is one of the few people who can diagnose the SAN,
              understand the Phoenix virtualization work, and interpret the failures that are
              stopping payroll. When the outage hits, Patty has to pull him off a promised Phoenix
              job for Sarah, which means one emergency immediately starves the next commitment.
          globalStep:
            name: "The organisation is brittle, not just overloaded"
            script: >-
              The deeper danger of knowledge silos is that work does not merely wait in a queue.
              It waits for a specific human being, and when that person is pulled into a crisis,
              every other priority stalls with them.

        - type: character
          id: sarah-moulton
          modalStep:
            name: "Meet Sarah Moulton"
            script: >-
              Once payroll is barely under control, Sarah Moulton enters the story. Sarah is
              the Senior Vice President of Retail Operations, and she speaks for a business
              that has been promised Phoenix for years. She does not arrive asking for nuance.
              She arrives demanding a date.
          globalStep:
            name: "Business pressure gets a voice"
            script: >-
              Sarah matters because Bill is no longer explaining technical risk into an open
              conversation. He is speaking into a room that has already decided speed is
              survival.

        - type: challenge
          id: blind-commitments
          modalStep:
            name: "The launch date is set before the work is understood"
            script: >-
              Bill makes this painfully concrete in the Phoenix meeting. He points out that
              the company gave new water fountains nine months of rollout planning, but Phoenix,
              which touches thousands of point-of-sale and back-office systems, is being given one
              week. The date is being committed before Operations even has complete specifications,
              hardware lead times, or a real deployment plan.
          globalStep:
            name: "Promises are outrunning capacity"
            script: >-
              What makes these commitments blind is that the business is not choosing between two
              fully understood options. It is promising an outcome before the operational work has
              been honestly sized, sequenced, or resourced.

        - type: quote
          id: sarah-touching-story
          modalStep:
            name: "Sarah refuses the technical explanation"
            script: >-
              Bill tries to explain the real operational constraints behind Phoenix, and Sarah
              cuts straight through him. Bill, that's a touching story, but we're not
              discussing water fountains, we're discussing Phoenix. In one line she reframes
              system reality as excuse-making.
          globalStep:
            name: "Risk gets reframed as hesitation"
            script: >-
              Sarah's quote lands because it shows how quickly genuine technical risk gets
              dismissed once a deadline has become a business promise.

        - type: challenge
          id: it-unreliable
          modalStep:
            name: "The business no longer believes IT can deliver"
            script: >-
              Sarah says it outright: because IT caused the payroll failure and Phoenix is already
              late, she does not think the business can depend on Bill and his team. By this point,
              every miss is no longer being read as a system problem. It is being read as evidence
              that IT is slow, broken, and untrustworthy.
          globalStep:
            name: "Credibility is collapsing along with the schedule"
            script: >-
              Once that perception hardens, it changes every conversation. Warnings sound like
              excuses, requests for time sound like delay tactics, and the threat of outsourcing
              starts to feel plausible to the rest of the business.

        - type: challenge
          id: firefighting
          modalStep:
            name: "Firefighting becomes the operating model"
            script: >-
              Look at Bill's first week as a whole. Promotion, payroll, outages, Phoenix,
              escalations. The rhythm is interruption, recovery, and then the next emergency.
              Every crisis steals time from the work that might have prevented the next one.
          globalStep:
            name: "Unplanned work dominates the board"
            script: >-
              Once firefighting is visible, the week stops looking like bad luck. It starts
              looking like a system that generates its own emergencies.

        - type: challenge
          id: no-visibility
          modalStep:
            name: "Nobody can see the full queue"
            script: >-
              Bill keeps asking the simplest possible management questions. What is in
              flight? What can wait? Where has the capacity gone? Nobody can answer cleanly,
              because work is scattered across spreadsheets, emails, and people's heads. There
              is no shared view of demand.
          globalStep:
            name: "Invisible work drives every bad decision"
            script: >-
              The deepest problem in the opening is visibility. A system you cannot see is a system
              you can only react to, and reaction is all this organisation has left.

        - type: "epic"
          id: "audit-compliance"
          modalStep:
            name: "The audit proves the disorder is systemic"
            script: |-
              Then Nancy Mailer delivers the final blow: a massive audit report with hundreds of IT control deficiencies and the threat of material weaknesses. Up until now, the team could pretend the damage was limited to outages and delays. The audit proves the disorder runs much deeper, into governance and financial reporting.
          globalStep:
            name: "Three pressures, one overloaded system"
            script: |-
              Phoenix is late, payroll has failed, and the audit says the chaos is structural. Bill is not inheriting three separate problems. He is inheriting one broken system seen from three different angles.
    - id: segment-2
      title: "Overload, Changes, and the Constraint"
      subtitle: "Visible work exposes impossible demand and fragile handoffs"
      start: "15:00"
      end: "25:00"
      phase: early-mid
      pageScript: >-
        Once the first wave of crises settles down enough to breathe, Bill starts looking
        for the deeper cause. He expected to find a few broken processes. What he actually
        finds is a system drowning in work it has already accepted.
      contentSetupScript: >-
        Here the story changes from incident response to diagnosis. Patty gives
        Bill numbers. Erik gives him language. And together they make the chaos measurable.
      narrativeArc: >-
        Once the smoke clears enough to see the board, Bill discovers the real enemy is
        overload.
      takeaway: >-
        When everything is in flight, the constraint breaks first, handoffs get slower,
        and even obvious staffing problems will be dismissed if the business sees IT as
        cost instead of value.
      summary: >-
        Here the system becomes measurable. Bill learns that demand is far
        larger than anyone has admitted, that Brent is functioning as the constraint for both
        project work and operational work, and that the change board has exposed a whole class
        of work the company was barely counting. He also sees how overload turns into daily
        context switching, stalled critical-path work, and public deadline slippage. And he
        learns something wider than staffing: when executives experience IT mainly as high cost
        and weak delivery, even a correct capacity diagnosis will not automatically earn more
        support. By this point, the team can see the overload clearly, but the business
        still drives Phoenix toward launch anyway.
      reveals:
        - type: "character"
          id: "erik-reid"
          modalStep:
            name: "Meet Erik Reid"
            script: |-
              Bill goes to a meeting and mistakes Erik Reid for the doughnut delivery man. Erik is kneeling on the floor unpacking Vandal Doughnuts, wearing wrinkled khakis and an untucked denim shirt. Then he stands up, introduces himself, and Bill realises he is talking to the board candidate who is about to become his mentor. Erik's role in the story is not to hand Bill a quick fix. He gives Bill an assignment: learn to see the different kinds of work entering IT, and then learn the principles that govern how that work must flow.
          globalStep:
            name: "Erik changes the conversation"
            script: |-
              Erik does not start by telling Bill how to fix payroll or Phoenix. He takes him to the MRP-8 plant, shows him piles of work in front of the heat-treat oven, and teaches him to see IT as a flow system with constraints. From then on, Erik keeps giving Bill two linked lessons: first, name the work correctly; then learn the ways a healthy system manages that work.
        - type: "quote"
          id: "erik-what-is-work"
          modalStep:
            name: "Erik asks the question Bill cannot yet answer"
            script: |-
              Erik ends the plant visit with a deceptively simple question: what then, exactly, is your definition of work? Bill has been managing tasks, outages, and promises without a clear model of what kind of demand is entering the system.
          globalStep:
            name: "The question behind the framework"
            script: |-
              Erik leaves Bill with a slip of paper and a challenge: you have already named one type of work, now go find the other three. What Erik means is business project work like Phoenix, the visible work everyone talks about. Bill can recognize that category, but he still cannot name the internal work, the changes, or the last and most destructive category.
        - type: challenge
          id: high-wip
          modalStep:
            name: "Patty and Wes reveal the impossible math"
            script: >-
              Patty and Wes put the project list in front of Bill. More than a hundred active
              projects for about a hundred and fifty people, while break-fix work is already
              consuming most of the team's time. The shocking thing is not just the volume.
              It is that nobody had ever put the total demand in one place before.
          globalStep:
            name: "Overload becomes visible"
            script: >-
              Overload becomes visible here, and intuition finally gives way to evidence. The organisation is not
              failing because people do not care. It is failing because it has said yes to far
              more work than it can physically carry.

        - type: challenge
          id: value-blind-staffing
          modalStep:
            name: "Bill discovers the staffing problem is also a value problem"
            script: >-
              Bill finally has the numbers he needs, so he goes to Steve expecting the staffing
              problem to become obvious. He makes the case plainly: Phoenix and the audit are
              competing for the same scarce people, the team is definitely understaffed, and
              either the project list must shrink or IT has to staff up.
          globalStep:
            name: "The company sees IT as cost before value"
            script: >-
              Steve's response pushes the real conflict into the open. The data does not change
              how he sees IT. He still experiences it first as an expensive function that keeps
              missing. That means even a correct staffing diagnosis does not automatically earn
              more staff. It raises the threat of cuts, layoffs, and outsourcing instead.

        - type: quote
          id: steve-cut-heads
          modalStep:
            name: "Steve says what Bill did not expect to hear"
            script: >-
              Instead of treating the numbers as proof that IT needs relief, Steve doubles down.
              His answer is not that the system is overloaded. His answer is that IT is already
              too expensive, Phoenix is already over budget, and the organization will have to
              cope with what it has.
          globalStep:
            name: "The value problem becomes unmistakable"
            script: >-
              The staffing conversation matters so much because Bill is no longer arguing
              only about capacity. He is colliding with an executive worldview that sees IT as
              cost before value. If leadership sees the function that way, every request for
              headcount sounds like overhead instead of protection for the business.

        - type: challenge
          id: bottleneck-people
          modalStep:
            name: "The constraint has a name"
            script: >-
              Once the work is visible, the same name keeps appearing at the point where
              everything slows down: Brent. Patty discovers that many scheduled changes never
              complete because they are all waiting on one person. Brent is not just busy. He
              is the constraint that determines the pace of the whole system.
          globalStep:
            name: "Brent must be protected"
            script: >-
              Bill's management problem changes shape here. The question is no
              longer how to make Brent work harder. The question is how to stop wasting the
              one constraint everyone depends on.

        - type: quote
          id: bill-system-gets-dumber
          modalStep:
            name: "Bill turns the bottleneck into a management lesson"
            script: >-
              Bill does not frame Brent as the problem. He frames the surrounding system as
              the problem. The danger is not just that Brent is overloaded. It is that every
              rescue leaves more knowledge trapped in Brent's head, so the next crisis is
              even more dependent on him than the last one.
          globalStep:
            name: "The response is protection and knowledge transfer"
            script: >-
              Bill creates the level-three escalation pool, gates access to
              Brent, and insists that other engineers document what they learn. He is trying
              to protect the constraint while making the system smarter every time Brent is
              needed.

        - type: challenge
          id: task-switching
          modalStep:
            name: "The same people keep getting yanked from one fire to the next"
            script: >-
              Bill insists that Brent must attend the Phoenix preparation work, and Wes admits he
              cannot because he is already on a network outage. That is the real operating rhythm
              here. Key people are pulled from incidents to projects to meetings to recovery work,
              so nothing gets uninterrupted attention for long.
          globalStep:
            name: "Context switching burns capacity invisibly"
            script: >-
              The team feels constantly busy without making proportional progress because
              Every interruption destroys continuity, every emergency resets focus, and the
              cumulative cost never appears on a project plan.

        - type: challenge
          id: stalled-projects
          modalStep:
            name: "Critical work is in flight but not actually moving"
            script: >-
              Kirsten reports that twelve tasks were in the Phoenix critical path last week and only
              three were completed. That is the signature of a stalled project. Work has started,
              executives believe it is underway, but dependencies, outages, and shared people keep
              it from finishing.
          globalStep:
            name: "In progress does not mean advancing"
            script: >-
              Overloaded systems create the illusion of movement this way: lots of commitments
              stay active on paper while the real work waits on Brent, on infrastructure, or on the
              next interruption.

        - type: challenge
          id: missed-deadlines
          modalStep:
            name: "The schedule starts failing in public"
            script: >-
              By now the slippage is no longer private. Steve gets escalation mail about the latest
              Phoenix slip, the project is declared red, and Sarah frames the delays as unacceptable.
              The team is already working under intense urgency, but heroic effort cannot close a gap
              between commitments and actual capacity.
          globalStep:
            name: "More urgency does not create more throughput"
            script: >-
              The deadline problem keeps recurring because the company keeps treating misses as
              a motivation failure when the real problem is a system design failure.

        - type: challenge
          id: incomplete-changes
          modalStep:
            name: "Changes go in but never come out"
            script: >-
              Patty's change boards reveal something even uglier than overload. Work is
              entering the system and staying there. Changes are half-finished, waiting on
              handoffs, reversions, approvals, or Brent. The team jokes that they are the
              Bates Motel of changes: changes check in, but they do not check out.
          globalStep:
            name: "Busy is not the same as done"
            script: >-
              The Bates Motel joke captures the whole feeling of this section. Everyone is exhausted,
              but almost nothing is truly finishing. The system is burning capacity without
              producing completion.

        - type: concept
          id: four-types-business
          modalStep:
            name: "The first type of work"
            script: >-
              Erik meant this category when he said Bill had already named one type without realizing it.
              The first type is business project work: the visible initiatives executives care
              about, like Phoenix. These are the projects everyone talks about, funds, tracks,
              and escalates.
          globalStep:
            name: "Not all demand is the same"
            script: >-
              It sounds obvious, but it matters because until now the organisation has mostly
              treated visible business projects as if they were the whole queue. The rest of the
              demand has been mixed in underneath them and managed far less explicitly.

        - type: concept
          id: four-types-internal
          modalStep:
            name: "The second type of work"
            script: >-
              The second type is internal IT work: upgrades, migrations, automation, and
              infrastructure changes. This work is often invisible to the business, which
              makes it easy to defer, even though it is what keeps the first type possible.
          globalStep:
            name: "Invisible support work matters"
            script: >-
              Once Bill sees internal projects as a distinct class of work, he can explain why
              starving them eventually makes every business promise harder to keep.

        - type: concept
          id: four-types-changes
          modalStep:
            name: "The third type of work"
            script: >-
              The third type is changes: the routine operational modifications required to
              keep systems running. These look small in isolation, but when they are badly
              managed they create outages, rework, and more demand than the system can absorb.
          globalStep:
            name: "Routine work can still destabilise the system"
            script: >-
              Patty's boards matter so much because change work is not background noise.
              It is a major source of both risk and load. But even here, Bill still has not
              solved Erik's puzzle. He can feel there is one more destructive category he has
              not yet learned to name.

    - id: segment-3
      title: "Unplanned Work, Flow, and the Freeze"
      subtitle: "The team stops treating symptoms and starts managing the system"
      start: "25:00"
      end: "35:00"
      phase: mid
      pageScript: >-
        Phoenix is now under crushing pressure. Sarah keeps escalating every slip, Steve is
        carrying commitments he has already made to the board and analysts, and Bill can see
        that Operations is being asked to support a launch it has not been allowed to prepare
        for properly. Brent is still being pulled into whatever is already broken,
        Development is still short on clean specifications and handoffs, and every delay is
        being read as hesitation instead of warning.
      contentSetupScript: >-
        Bill is trying to hold Phoenix work together while everything else keeps intruding on
        it. The arguments over readiness are still live, the handoffs between Development and
        Operations are still messy, and Friday night is arriving faster than the system is
        stabilizing. What matters here is whether anyone will listen before the rollout goes
        past the point where it can still be stopped.
      narrativeArc: >-
        Bill watches competing priorities and bad handoffs starve the launch, loses the
        argument over whether to stop it, lives through the anti-work it unleashes, and only
        then reaches the breakthrough that connects flow to disciplined project acceptance.
      takeaway: >-
        Unplanned work destroys planned work, and recovery only starts when leaders stop
        accepting work blindly, say no with data, and let capacity set the pace.
      summary: >-
        Phoenix is fragile long before launch night: critical prep work is starved by
        outages, dependencies, last-minute handoffs, and a leadership culture that confuses
        urgency with readiness. The Friday rollout confirms every warning Bill raised, and
        Saturday teaches him what unplanned work really is: anti-work that burns up
        everything the company meant to do. Erik then helps him connect Brent, technical
        debt, and overloaded commitments into one system problem. At the offsite, Bill
        finally states the deeper leadership failure: IT has been accepting work without any
        real analysis of demand, constrained resources, or the risk to existing
        commitments. The breakthrough is not another heroic recovery. It is the decision to
        stop being compliant order takers, freeze new work, and finally manage according to
        capacity and flow.
      reveals:
        - type: challenge
          id: business-pressure
          modalStep:
            name: "Phoenix keeps losing ground before launch night even starts"
            script: >-
              The launch trouble starts well before Friday night. Sarah escalates every Phoenix
              slip as if it proves IT lacks urgency. At the September 3 project meeting,
              Kirsten reports that only three of twelve critical-path tasks were completed.
              Brent is late again because he has been pulled into outages and other production
              work, while Development is still late with concrete specifications for test and
              production. Bill and Wes argue that Operations has not been given a real chance
              to prepare, but Sarah turns the conversation back to market pressure and Steve
              lets the date harden anyway.
          globalStep:
            name: "The launch date is set before readiness exists"
            script: >-
              Sarah pins down the date here: marketing launches on Saturday,
              September 13, and Phoenix deploys at 5 p.m. the previous day. Whether Operations
              can actually be ready by then is not a question anyone in that room is willing to ask.

        - type: challenge
          id: deployment-chaos
          modalStep:
            name: "Friday night begins with a rollout that cannot even stand up in test"
            script: >-
              By 4 p.m. Friday, IT Operations is assembled for the deployment, but there is
              almost nothing clean to deploy. Developers are still making last-minute code
              changes, QA cannot get Phoenix to pass smoke tests, files are missing, firewall
              ports were never specified, versions are changing faster than anyone can test
              them, and Brent plus the Operations team are reduced to googling configuration
              problems in real time. The rollout is already a death march before the actual
              go-live point has even arrived.
          globalStep:
            name: "The launch is already failing before the irreversible step"
            script: >-
              Bill pulls Wes, Patty, and William aside for a gut check, and they all tell him
              the same thing: this is FUBAR. William says there is genuine risk they will not
              have anything running by 8 a.m. when the stores open. Crucially, though, Wes
              says they can still stop the rollout for now. The point of no return has not
              been crossed yet.

        - type: quote
          id: sarah-we-must-go
          modalStep:
            name: "Bill makes one last push to stop the launch"
            script: >-
              Bill takes that last opening and uses it. He emails Steve recommending a one-week
              delay, warns of a near-certain disaster, then calls him directly. Steve refuses
              to stop unless Sarah agrees. Bill goes to Sarah in person, repeats the risks,
              and asks her to look at what is happening in the war room. She is unmoved.
              Marketing is ready, Development is ready, and in her mind Operations is the only
              thing standing in the way.
          globalStep:
            name: "The final off-ramp closes"
            script: >-
              Sarah's reply is the last real decision before go-live: everyone is ready but
              you, we must go. After that, the team is no longer arguing about whether this is
              wise. They are being driven forward by a decision already made above them.

        - type: challenge
          id: irreversible-rollout
          modalStep:
            name: "The true go-live moment is the database conversion"
            script: >-
              The actual point of no return arrives later that Friday night, around the moment
              the database conversion begins. Bill asks Wes exactly when they become committed,
              and Wes answers plainly: once they start converting the database so it can take
              orders from both the in-store POS systems and Phoenix, they are committed.
              Later they discover the conversion is crawling, cannot be stopped cleanly, and
              must finish before the POS systems can come back.
          globalStep:
            name: "From here, the launch can only fail forward"
            script: >-
              This is the singular go-live point. Up to here, Bill can still
              try to stop Phoenix. After this, the business is trapped inside the rollout.
              Phoenix may still limp toward being online, but the stores, the POS systems,
              and the next morning's operations are now hostage to whatever this conversion
              does.

        - type: challenge
          id: ground-floor-disconnect
          modalStep:
            name: "The launch fails where the business actually lives"
            script: >-
              By Saturday morning, after the overnight rollout crosses that point of no
              return, the failure is landing exactly where Bill feared it would:
              in the stores. The in-store POS systems are down, so staff fall back to manual
              tills and manual card swipes, carbon-copy receipts get stuffed into shoeboxes,
              people run out for more supplies and change, and the phones in IT light up with
              calls from roughly a hundred and twenty stores. The decision to launch was made
              high above the ground floor. The consequences are not.
          globalStep:
            name: "IT failure becomes frontline business failure"
            script: >-
              The first visible consequence is that IT systems directly shape whether
              employees can serve customers and whether the company can actually sell
              anything. Once the stores fall back to paper and manual work, you can no longer
              pretend technology failure is merely a technical problem.

        - type: challenge
          id: order-integrity-collapse
          modalStep:
            name: "The damage spreads from performance to trust"
            script: >-
              The damage does not stay in the stores. Some online customers find the site
              unusable. Others arrive at stores and discover their transactions were lost, or
              worse, that they were charged twice or three times. Finance opens another war
              room to process piles of faxed problem orders, engineers have to build
              emergency tools for the backlog, and then the website starts exposing customer
              credit card numbers when sessions crash.
          globalStep:
            name: "Phoenix becomes a public fiasco"
            script: >-
              Now the launch has become more than a bad deployment. It is a customer
              trust problem, a data integrity problem, a security breach, a finance problem,
              and a press story all at once. That is why the recovery effort swallows the
              organisation whole.

        - type: character
          id: chris-allers
          modalStep:
            name: "Chris stops acting like the other side"
            script: >-
              In the middle of the Phoenix cleanup, Chris Allers, the head of development,
              does something new. He apologises to Bill and agrees to meet with him regularly.
              On paper that sounds small, but here it is huge. For the first time, Development
              and Operations start talking about the same system instead of defending their
              own silos.
          globalStep:
            name: "Blame gives way to coordination"
            script: >-
              Chris matters here because no amount of operational excellence can save a value
              stream that is still organised around rivalry and blame.

        - type: challenge
          id: no-ownership
          modalStep:
            name: "The invoicing crisis tests Bill's new discipline"
            script: >-
              Just as the team starts regaining some footing, Accounts Receivable discovers
              that customers have not been invoiced for three days, opening a potential
              fifty-million-dollar cash shortfall. Bill does not treat it like another panic
              sprint. He treats it like an Apollo 13 incident. Patty assembles the recent
              changes, owners are assigned to each plausible cause, and Bill gives one clear
              order: nobody touches anything without approval. Most importantly, he refuses
              to throw Brent into the outage just because Brent is the usual answer. Bill is
              finally trying to protect the constraint and keep the investigation disciplined.
          globalStep:
            name: "Bill is finally managing the system, not feeding the reflex"
            script: >-
              The key point is not that Bill has become passive. It is the opposite. He is
              finally leading the way he thinks the system must be led: gather evidence,
              control the blast radius, and stop making Brent the answer to every fire.

        - type: quote
          id: steve-captain-kirk
          modalStep:
            name: "Steve blows up the discipline Bill is trying to build"
            script: >-
              Dick tells Steve that IT is dragging its feet, and Steve calls Bill at home.
              Bill argues that the team finally has a real incident process, that rushing in
              blind will make the outage worse, and that dragging Brent back into the middle
              of the crisis will repeat the same dependency they have been trying to break.
              Steve rejects all of it. He wants visible urgency, Brent in the office, and
              every available engineer on the problem immediately.
          globalStep:
            name: "Poor leadership turns one crisis into several"
            script: >-
              Bill hangs up and tells Steve to expect his resignation in the morning. Then
              the consequences arrive exactly as Bill feared. Steve's all-hands override
              pulls Brent back into the crisis, coordination breaks down, the inventory
              systems go down as well, and Finance loses even more of the visibility it needs
              to close the quarter. Bill's resignation is not just emotional exhaustion. It
              is the verdict on a leadership pattern that destroys operating discipline the
              moment pressure spikes.

        - type: quote
          id: steve-ninety-days
          modalStep:
            name: "Bill steps away before Steve earns a second chance"
            script: >-
              Bill really does leave. For several days he sleeps, deletes the work accounts,
              takes Grant to watch trains, and tries to remember what ordinary family life
              feels like. While he is away, Wes and Patty tell him that Steve's override has
              made the situation worse, exactly as Bill predicted. Even then, Bill does not
              rush back. Steve has to call Paige, admit he has been a jackass, and ask Bill
              for one more conversation.
          globalStep:
            name: "Steve finally gives Bill a reason to return"
            script: >-
              Steve does not bully Bill back. He apologises, admits he delegated IT away,
              says Erik and the audit committee forced him to face how badly he has handled
              the relationship, and offers Bill ninety days to try again with real backing.
              That is the beginning of Steve's character change. He stops demanding rescue
              and starts asking Bill to help him understand the system he has been making
              worse.

        - type: quote
          id: steve-say-no-with-data
          modalStep:
            name: "Steve calls the meeting the morning after his call with Bill"
            script: >-
              The next morning Bill drives into work for what Steve is calling an off-site,
              even though the meeting is in Building 2's corporate boardroom. Chris, Wes,
              and Patty are already there. John arrives late — Steve had forgotten to invite
              him. Before any business is discussed, Steve asks everyone to share something
              from their personal history. The room goes quiet. Then Chris goes first, then
              Wes, then Patty, then Bill. By the time Bill finishes, he is crying for the
              first time in thirty years. What Steve is doing is creating the foundation of
              trust the team has never had. Only after that does the real conversation about
              IT commitments, capacity, and demand begin.
          globalStep:
            name: "Capacity planning becomes the basis for commitment"
            script: >-
              Erik's plant lesson finally lands in executive language here. In the
              plant, they check bills of material, routings, work centers, and existing load
              before accepting an order. Bill now sees that IT needs the same discipline before
              it accepts another project, and that projects should be screened against three
              questions: do they improve flow, do they strengthen operational stability, and do
              they give the constrained resource more usable capacity.

        - type: epic
          id: project-freeze
          modalStep:
            name: "The project freeze"
            script: >-
              Once the trust is in the room, the honest business conversation can happen.
              Bill lays out the full picture: thirty-five business projects, seventy-five
              ops projects, thousands of changes in the backlog, and an ever-growing pile
              of unplanned work, all competing for the same constrained people. The team
              is way over capacity and nobody has been saying so out loud. The decision that
              comes out of the meeting is a project freeze: stop launching new work until
              the system can actually finish what it has already started, and build the data
              needed to make rational commitments in future.
          globalStep:
            name: "Stopping becomes the first real systems decision"
            script: >-
              The freeze sounds backwards, but it is the first honest response to overload.
              It creates the breathing room to stop being order takers, reduce WIP, and start
              asking whether new work can be accepted without breaking existing commitments.
              From here on, project acceptance is no longer just a budget or deadline question.
              It becomes a flow, stability, and bottleneck-capacity question.
              In the first week after it begins, the team gets more done than it normally does
              in an entire month.

        - type: challenge
          id: work-piles-up
          modalStep:
            name: "Queues write the real schedule"
            script: >-
              Once intake slows down, the team can finally see where the backlog actually
              forms. Work piles up at the constraint whether or not anyone wants to admit it.
              That means the true schedule is written by waiting time, not by the plan in a
              status deck.
          globalStep:
            name: "The blockage becomes visible"
            script: >-
              The conversation changes at this point from why are smart people behind
              to where, exactly, is flow being blocked.

        - type: concept
          id: four-types-unplanned
          modalStep:
            name: "Bill finally names the fourth type"
            script: >-
              The realization finally lands here. After Phoenix blows up and Patty's
              board shows that planned changes did not get finished because recovery work took
              over, Bill finally sees what Erik meant. The fourth type is unplanned work:
              incidents, outages, recovery, escalations. It is the most destructive because it
              does not merely compete with planned work. It prevents planned work from being
              done at all.
          globalStep:
            name: "The puzzle Erik gave him clicks into place"
            script: >-
              Bill did not understand this back at the plant. He had to live through the
              Phoenix fiasco, watch unplanned work clear the board, and then call Erik with
              the answer. Only here does the framework become fully real to him.

        - type: challenge
          id: local-optimization
          modalStep:
            name: "Every team was optimising the wrong thing"
            script: >-
              Erik helps Bill see that each group has been chasing its own local metrics.
              Development optimises feature output, Operations optimises uptime, Security
              optimises findings, and nobody is optimising the whole path from idea to value.
          globalStep:
            name: "Local wins create global losses"
            script: >-
              Erik's first big lesson lands at this point. Bill has now seen the
              constraint, the queue, the damage from unplanned work, and the failure of each
              silo to optimise the whole. That is what teaches him the First Way: start with
              flow across the entire system, not local efficiency inside each team.

        - type: challenge
          id: tech-debt-vs-features
          modalStep:
            name: "Feature pressure keeps starving the system work underneath it"
            script: >-
              Erik finally names another pattern that has been hiding in plain sight. Development
              has been spending its cycles on features instead of stability, security, scalability,
              manageability, operability, and continuity. Phoenix is not just late because people are
              overloaded. It is fragile because the company kept prioritizing visible features over
              the engineering work that would have made those features safe to run.
          globalStep:
            name: "Neglected debt returns as unplanned work"
            script: >-
              Erik links technical debt directly to Brent and to unplanned work for exactly this reason. When
              operability gets deferred, the future shows up as outages, rework, and even less
              capacity for the next round of features.

        - type: concept
          id: first-way
          modalStep:
            name: "The First Way"
            script: >-
              The First Way is flow. Optimise the movement of work from left to right across
              the whole system. Protect the constraint. Reduce work in progress. Stop passing
              defects downstream. In other words, stop asking each team to look efficient and
              start asking the whole system to move work cleanly.
          globalStep:
            name: "Flow explains the opening chaos"
            script: >-
              Now the earlier crises become legible. The payroll failure, the Phoenix
              disaster, the endless escalations — they were not random. They were what a
              low-flow system looks like under pressure.

    - id: segment-4
      title: "Feedback, Quality, and Business Risk"
      subtitle: "Quality improves when feedback loops get shorter and business context gets clearer"
      start: "35:00"
      end: "45:00"
      phase: late-mid
      pageScript: >-
        Once flow starts improving, the next question is how to keep quality from collapsing
        under speed. The audit storyline becomes crucial here, because the company learns
        something surprising: not every scary IT finding is where the real financial risk
        lives. To understand that, Bill has to watch John, Finance, Audit, and Erik collide.
      contentSetupScript: >-
        The first half of this section belongs to John. He begins as the man with the binder,
        convinced that more controls and more urgency must mean more safety. What changes him
        is learning to trace the full business process and seeing where the company is
        actually relying on controls to catch material error. The back half belongs to Bill
        and Patty's sponsor interviews, where Ron and Maggie translate IT defects into lost
        orders, bad demand data, and delayed market response.
      narrativeArc: >-
        The organisation starts making better decisions when it can see both the work and
        the business impact, and when it learns which controls genuinely matter.
      takeaway: >-
        Quality is not just testing harder. It is shortening feedback loops, reducing
        handoff delay, and tying both controls and engineering work to the business outcome
        they are meant to protect.
      summary: >-
        The freeze proves that focus helps, but Patty's analysis shows the harder truth: work still
        dies in queues, handoffs, and undocumented dependencies. At the same time, Bill and John
        learn that many supposedly new problems are actually repeat findings and repeat patterns.
        Queue math makes long lead times visible, and audit scoping plus the Ron-and-Maggie sponsor
        interviews make business risk visible in lost orders, stockouts, and bad demand signals. By
        this point, quality stops meaning 'inspect harder later' and starts meaning
        shorter feedback loops, clearer release control, and business-aligned countermeasures.
      reveals:
        - type: character
          id: john-pesche
          modalStep:
            name: "John arrives carrying the compliance worldview"
            script: >-
              John Pesche enters the story as the person nobody in Operations wants in the
              room. He carries the binder, talks in audit language, fast-tracks urgent control
              work, and genuinely believes he is protecting the company from catastrophe. The
              important thing is that John is not a caricature. He is directionally right that
              the company has real control problems. What he cannot yet see is where the most
              important risk is actually being created and caught.
          globalStep:
            name: "The audit makes John's motive impossible to ignore"
            script: >-
              The SOX findings make John matter, because they prove the control failures are
              not imaginary. But at this point he is still fighting the problem in the only
              way he knows how: push harder, add controls, and demand urgency from inside the
              security silo.

        - type: challenge
          id: repeated-mistakes
          modalStep:
            name: "The company is paying for the same failures again"
            script: >-
              Nancy makes the problem explicit: many of the audit findings are repeat findings going
              into the third year. That means the organisation is not merely making mistakes. It is
              failing to convert known failures into durable changes in how the work is done.
          globalStep:
            name: "A repeat finding is proof the system did not learn"
            script: >-
              The phrase matters because it changes the meaning of the audit. The issue is no
              longer just control weakness. It is organisational memory failure.

        - type: quote
          id: john-orange-jumpsuits
          modalStep:
            name: "John explains the fear underneath the posture"
            script: >-
              John's abrasive style makes more sense once you hear the motive behind it. He
              is trying to keep executives out of orange jumpsuits. The problem was never that
              he cared too much about risk. The problem was that he had no way to connect risk
              to the actual business system.
          globalStep:
            name: "The tokenization disaster shows the limit of John's model"
            script: >-
              John's arc becomes painful instead of cartoonish here. He bypasses the
              normal system to rush tokenization into production, helps trigger a payroll
              disaster, and then learns in the audit meeting that the work was not even in
              scope for SOX. He is chasing risk, but he is not yet tracing where the business
              is actually relying on a control.

        - type: quote
          id: erik-end-to-end-business-process
          modalStep:
            name: "Erik names John's blind spot"
            script: >-
              Erik's line reframes the whole audit story. He does not tell John
              that controls are useless. He tells him that without seeing the end-to-end
              business process, John cannot tell which controls are essential, which are
              redundant, and which are solving the wrong problem entirely.
          globalStep:
            name: "The audit lesson becomes visible"
            script: >-
              Later, Finance walks the auditors through the real flow of money and shows that
              even if upstream applications and infrastructure were compromised, material
              errors would still be caught by manual reconciliation controls downstream. That
              is the breakthrough: the company gets the auditors off its back not by claiming
              perfect IT controls, but by proving where the relied-upon controls actually sit.

        - type: challenge
          id: failed-handoffs
          modalStep:
            name: "A forty-five-minute task becomes a multi-week delay"
            script: >-
              Patty traces one of Brent's so-called quick tasks and discovers it involves more
              than twenty steps across six teams. The work itself is short. The waiting is
              enormous. Every handoff adds delay, context loss, and another chance for the
              task to stall.
          globalStep:
            name: "Waiting becomes the real cost"
            script: >-
              Patty's work matters here for the same reason Faye's audit walkthrough matters.
              Both force the company to trace the real path instead of the org chart fantasy.
              In an overloaded system, queue time matters more than touch time, and handoffs
              hide the risk until somebody makes the flow visible.

        - type: quote
          id: bill-wait-time-busy-idle
          modalStep:
            name: "Bill makes the queue math visible"
            script: >-
              Bill's chart is the cleanest visual summary of what he and Patty have just learned.
              Once a person in the chain is near full utilization, work does not slow down a
              little. It waits exponentially longer. So a task that looks like thirty minutes
              of touch time turns into days of lead time because it keeps landing in somebody
              else's queue.
          globalStep:
            name: "Overutilization is why the chain seizes up"
            script: >-
              The late-mid lesson the team needed is that the problem is not merely that too
              many people are busy. It is that every overloaded handoff magnifies the wait for
              the next one. That is why Brent's quick tasks get stuck, why the whole task
              chain becomes unpredictable, and why protecting capacity matters more than
              keeping every person maximally utilized.

        - type: challenge
          id: long-lead-times
          modalStep:
            name: "Busy teams still deliver painfully slowly"
            script: >-
              Once Erik walks Bill through the utilization math, the paradox becomes obvious. A
              system can look fully loaded and still deliver terribly slowly, because the touch time
              is tiny compared to the waiting time. Work spends days sitting in queues while everyone
              involved looks busy.
          globalStep:
            name: "Lead time is mostly waiting, not doing"
            script: >-
              The company keeps being surprised by how long seemingly small tasks take because
              the work is not intrinsically large. The queues are.

        - type: challenge
          id: deployment-failures
          modalStep:
            name: "Releases still feel like a gamble"
            script: >-
              The team attempts another major Phoenix deployment and once again runs into a
              critical failure late in the game. This time the culprit is an undocumented
              production database change. The lesson is painful: even after all the progress,
              the organisation is still learning too late and in batches that are far too big.
          globalStep:
            name: "Release risk is designed in"
            script: >-
              The important point is not that releases are risky. It is that the system was
              still structured to discover risk at the most expensive possible moment.

        - type: challenge
          id: late-detection
          modalStep:
            name: "Feedback arrives after the damage is done"
            script: >-
              Late detection is what turns ordinary engineering mistakes into executive
              crises. If you only learn that something is broken during payroll, during a big
              release, or during an audit, the blast radius is already enormous.
          globalStep:
            name: "Quality depends on timing"
            script: >-
              Bill learns this lesson the expensive way: through payroll failures, broken
              releases, audit findings, and defects discovered only when the blast radius is
              already huge. That accumulation of pain is what leads him to the next idea:
              quality improves only when feedback loops get shorter, earlier, and harder to
              ignore.

        - type: quote
          id: erik-three-ways
          modalStep:
            name: "Erik gives Bill the frame for what comes next"
            script: >-
              Erik had already told Bill that once he learned to control work at the system
              level, he would be on his way toward understanding the Three Ways. By this point
              in the story, Bill has lived enough failures to hear that lesson properly.
          globalStep:
            name: "The audit story feeds directly into the Second Way"
            script: >-
              John learns to ask where the business truly relies on a control. Bill learns to
              ask how to surface problems sooner and closer to the source. Those are two sides
              of the same insight, and they lead directly into the Second Way.

        - type: character
          id: ron-johnson
          modalStep:
            name: "Ron turns IT failure into lost revenue"
            script: >-
              Ron Johnson is the first business process owner Bill and Patty interview, and he
              gives them the sales version of Maggie's frustration. He owns sales pipeline and
              forecast accuracy, and he ties those measures directly to IT reliability. When MRP
              and the phones fail, orders do not merely get delayed inside IT. Customers cancel,
              contracts go up for rebid, and sales people miss quota because the company could
              not transact when demand was there.
          globalStep:
            name: "The business risk gets priced in orders and contracts"
            script: >-
              Ron matters because he converts a technical outage into commercial loss. He also
              reinforces the stockout problem: the company cannot forecast well because it still
              does not know what customers actually want. That makes him the revenue-side half
              of the sponsor interview sequence that Maggie completes from the retail side.

        - type: quote
          id: ron-clueless-what-customers-want
          modalStep:
            name: "Ron names the demand-signal failure outright"
            script: >-
              Ron's line connects him directly to Maggie. He says the company is
              clueless about what customers want: too much product that will never sell and not
              enough of the items that do. That ties sales forecast accuracy back to the same bad
              order, inventory, and stockout data Maggie later attacks from the retail side.
          globalStep:
            name: "Sales and retail are describing the same blindness"
            script: >-
              Ron is not asking for prettier analytics either. He is saying bad demand data is
              suppressing revenue right now, because the easiest sales are walking out the door
              when stores are out of stock.

        - type: character
          id: maggie-lee
          modalStep:
            name: "Maggie names the reporting failure behind the business frustration"
            script: >-
              Maggie is where the story stops talking about Phoenix as an abstract strategy and
              starts talking about what the business still cannot see. She tells Bill and Patty
              that most of the time Retail is flying blind. The order entry and inventory data
              are often wrong, the monthly reports from Finance are full of errors, and the
              company cannot trust its own reporting enough to forecast demand or steer the
              business quickly.
          globalStep:
            name: "Her complaint is not cosmetic reporting"
            script: >-
              Maggie's complaint matters because she is not asking for prettier dashboards. She
              is saying the company cannot tell what customers want, cannot reliably see
              stockouts and sales patterns, and therefore cannot make fast commercial bets with
              confidence. This is business blindness, not reporting polish.

        - type: quote
          id: maggie-flying-blind
          modalStep:
            name: "Maggie reduces the whole problem to one line"
            script: >-
              Maggie's line makes her memorable. She is not complaining that the
              reports are inconvenient. She is saying the business lacks trustworthy, timely
              information about demand, inventory, and customer behaviour. For her, that makes
              Phoenix unfinished no matter how much code has shipped.
          globalStep:
            name: "The data complaint becomes a strategy complaint"
            script: >-
              Once Maggie says they are flying blind, the rest of her critique lands harder.
              Phoenix was supposed to improve reporting, but those features keep getting
              dropped. So the company keeps shipping effort without delivering the visibility
              that would actually let Retail forecast, experiment, and respond to the market.

        - type: concept
          id: second-way
          modalStep:
            name: "The Second Way"
            script: >-
              The Second Way is feedback. Build loops that expose problems early, share
              responsibility across teams, and make quality everybody's job. Do not wait for
              production night, audit season, or public embarrassment to learn what the system
              could have told you much earlier.
          globalStep:
            name: "Feedback turns discipline into learning"
            script: >-
              With feedback in place, the organisation can finally improve on purpose instead
              of only learning through outages.

    - id: segment-5
      title: "Automation, Experimentation, and Strategic Ownership"
      subtitle: "Unicorn proves the model, and learning becomes an organisational capability"
      start: "45:00"
      end: "55:00"
      phase: late
      pageScript: >-
        By now, the change is measurable. Major outages are down, recovery
        is faster, and Brent is almost caught up. But the real question is bigger than
        stability. Can this organisation turn operational improvement into strategic
        advantage?
      contentSetupScript: >-
        The answer comes through automation, safe experimentation, and one final insight:
        if a capability sets the pace of the business, you eventually have to own it.
      narrativeArc: >-
        The ending matters because the team stops treating IT as a cost centre and starts
        treating it as strategic capability.
      takeaway: >-
        High performance comes from automation, safe experimentation, and owning the
        capabilities that set the pace of the business.
      summary: >-
        Unicorn proves the new model in production: smaller batches, automated environments,
        rapid security fixes, and constant experimentation start generating real revenue. The team
        then pushes further by hardening systems through deliberate fault injection and by pulling
        strategic capabilities back in-house when outsourcing becomes the constraint. The MRP story
        makes the final lesson concrete: even after fixing internal flow, the company still cannot
        compete if a vendor controls a core manufacturing capability, its delivery schedule, and the
        price of change. The ending's final point is organizational: IT is not a side function to
        delegate away when it sets the pace of the business.
      reveals:
        - type: epic
          id: unicorn-project
          modalStep:
            name: "Unicorn proves the model"
            script: >-
              Project Unicorn is where the team's hard-won lessons become a repeatable
              delivery capability. Smaller batches, automated environments, and a real
              deployment pipeline finally make it possible to move quickly without gambling the
              company every time code ships.
          globalStep:
            name: "The transformation becomes visible"
            script: >-
              Unicorn matters because it shows the change is not theoretical. The very same
              organisation that used to melt down over releases can now create value with
              speed and confidence.

        - type: quote
          id: steve-flow-forward
          modalStep:
            name: "Steve starts speaking the language of flow"
            script: >-
              One of the clearest signals that the company has changed is that Steve's own
              language changes. He is no longer asking only for speed and deadlines. He is
              starting to recognise waste, rework, and the need for work to move in one
              direction: forward.
          globalStep:
            name: "Leadership has matured"
            script: >-
              Leadership's change matters because executive behaviour helped create the old system. By the
              end, the CEO sounds like someone who has internalised systems thinking instead
              of just applying pressure.

        - type: challenge
          id: fear-of-failure
          modalStep:
            name: "The team learns to fail safely"
            script: >-
              Near the end, the team starts deliberately breaking things in
              controlled ways to make the platform more resilient. The point is no longer to
              avoid every failure at all costs. The point is to practice, learn, and harden
              the system before reality does it for you.
          globalStep:
            name: "Failure becomes a teacher"
            script: >-
              A deep cultural shift is underway. Failure stops being something to hide and starts
              becoming something the team studies and learns from.

        - type: "challenge"
          id: "vendor-lock-in"
          modalStep:
            name: "The constraint moves outside IT"
            script: |-
              Sarah brings a real competitive threat: a rival is already selling custom build-to-order kits, and Parts Unlimited is losing sales. Wes investigates what it would take to change the outsourced MRP system that runs the plants and comes back furious. The vendor wants six months for requirements, nine more for build and test, no real start until June, and fifty thousand dollars just for the feasibility study and a slot in the queue. That means a business-critical change cannot even begin on business time.
          globalStep:
            name: "Strategic capabilities must be owned"
            script: |-
              One of the sharpest late lessons emerges here. The company outsourced MRP because it looked non-strategic and expensive. Now that same system determines whether Parts Unlimited can respond to the market. The vendor is not just slow. It is charging for access to its own queue while the business falls behind. At that point, bringing the capability back in-house is not an ideological move. It is a competitive necessity.
        - type: quote
          id: wes-eighteen-months
          modalStep:
            name: "Wes brings back the vendor's answer"
            script: >-
              Wes makes the pain undeniable here. He is not complaining about a bad
              meeting or a difficult partner. He is reporting the vendor's actual operating model:
              long requirement lead times, long development lead times, delayed staffing, and an
              upfront fee before meaningful work even starts.
          globalStep:
            name: "The vendor controls pace and price"
            script: >-
              Once Bill hears this, the problem becomes structural. Parts Unlimited is no longer
              just waiting on another internal team. It is stuck behind a vendor queue whose goals,
              contract incentives, and economics are misaligned with the business.

        - type: quote
          id: steve-outsourcer-hostage
          modalStep:
            name: "Steve names the strategic danger directly"
            script: >-
              Steve's language matters here because it shows how far the executive understanding
              has evolved. Earlier he treated IT largely as cost and broken promises.
              Here he sees the outsourced MRP platform for what it has become: a core capability
              whose owner is now constraining the future of the company.
          globalStep:
            name: "In-house becomes the only credible path"
            script: >-
              The proposal changes from incremental vendor management to contract
              buyout. Bill's team argues for spending nearly a million dollars to regain control of
              the application, pull roughly six people back into the company, and integrate MRP
              with Unicorn so build-to-order capability can be delivered in about ninety days
              instead of eighteen months.

        - type: challenge
          id: heroics-over-systems
          modalStep:
            name: "Do not celebrate the wrong thing"
            script: >-
              Even now, the temptation remains to celebrate heroes instead of fixing systems.
              Pull Brent into the next emergency, rescue the next project, and tell yourself
              the company is fine because smart people saved it again.
          globalStep:
            name: "Less heroism, more capability"
            script: >-
              By the end, Bill has seen that flow and feedback are still not enough if the
              organisation only improves when disaster forces it to. Unicorn, deliberate
              experiments, and the move away from heroics teach the final lesson: a healthy
              system has to practice learning on purpose, not just survive the next fire.

        - type: concept
          id: third-way
          modalStep:
            name: "The Third Way"
            script: >-
              The Third Way is continual learning and experimentation. Practice failure.
              Run experiments. Hold blameless reviews. Build resilience into the way work
              happens so the organisation gets better every time it encounters stress.
          globalStep:
            name: "Learning becomes a business capability"
            script: >-
              The story reaches its destination here. IT stops being a cost centre that the
              business tolerates and becomes a capability the business depends on to win.

    - id: outro
      title: "The Transformation"
      subtitle: "From firefighting to strategic capability"
      start: "55:00"
      end: "60:00"
      phase: outro
      pageScript: >-
        At its core, this story is not really about servers, tickets, or org charts. It
        is about learning to see the system: the flow of work, the constraint, the
        feedback loops, and the culture that determines whether people can improve it. Bill
        Palmer enters the story as a reluctant manager trying to survive the week. He leaves
        it as someone who understands how the business actually runs.
      reveals: []
