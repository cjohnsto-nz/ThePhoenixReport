# Timeline Configuration
# Controls the presentation flow - 60 minutes total
# Reveals are in narrative order — characters & epics first to set the scene,
# then challenges & concepts build on them. Order in the array = reveal order.
# Each reveal can optionally define two explicit script beats for the controls:
#   modalStep  — shown while the detail modal is on screen
#   globalStep — shown after the card is placed back into the dashboard
# Example:
# - type: character
#   id: bill-palmer
#   modalStep:
#     name: "Meet Bill Palmer"
#     script: "Bill inherits a crisis-ridden organization and becomes our lens into the crisis."
#   globalStep:
#     name: "Bill in context"
#     script: "Bill's story now anchors the broader system problems already visible on the board."

presentation:
  totalDuration: 60 # minutes
  segments:
    - id: intro
      title: "The Phoenix Project"
      subtitle: "A Novel About IT, DevOps, and Helping Your Business Win"
      start: "00:00"
      end: "05:00"
      phase: intro
      reveals: []

    - id: segment-1
      title: "Chaos and Invisible Work"
      subtitle: "Early — The organization is overwhelmed, reactive, and lacks visibility"
      start: "05:00"
      end: "15:00"
      phase: early
      narrativeArc: "We are overwhelmed and don't understand why"
      takeaway: "Organizations fail not because of lack of effort, but because they cannot see or control their work system."
      summary: "Bill inherits a crisis-ridden organization where work is invisible, commitments are disconnected from capacity, and operational chaos dominates daily life. The first section establishes the human cost of unplanned work and frames Phoenix as the forcing function that exposes deeper systemic problems."
      reveals:
        # Story setup: meet the people, then the crisis
        - type: character
          id: bill-palmer
          modalStep:
            name: "Meet Bill Palmer"
            script: "Bill Palmer is our point-of-view character. He has just inherited a failing IT organization, and he is walking into a system that is overloaded, opaque, and already on fire."
          globalStep:
            name: "Bill inherits the crisis"
            script: "Back on the global view, position Bill as the leader forced to make sense of chaos. He is not the cause of the dysfunction, but he is the person now accountable for stabilizing it."
        - type: character
          id: steve-masters
          modalStep:
            name: "Pressure from the top"
            script: "Steve Masters brings business urgency and executive pressure. He represents the demand for fast results, fixed dates, and visible progress, regardless of what the system can actually support."
          globalStep:
            name: "Leadership pressure compounds"
            script: "With Steve on the board, the audience should feel the squeeze on Bill: operational chaos below, executive pressure above, and almost no room to slow down and understand the system."
        - type: character
          id: wes-davis
          modalStep:
            name: "Operations under strain"
            script: "Wes Davis embodies day-to-day operational pain. He lives inside the interruptions, escalations, and fragile systems that keep forcing the organization into reactive mode."
          globalStep:
            name: "Heroics hide the damage"
            script: "Now that Wes is visible in the global view, connect the human toll of interruptions and burnout to the system's deeper structural problems. Heroics keep things moving, but they also conceal how broken the flow has become."
        - type: epic
          id: phoenix-project
          modalStep:
            name: "The project that changes everything"
            script: "Phoenix is not just another initiative. It is the forcing function that exposes every hidden weakness in the organization: weak flow, poor visibility, overloaded teams, and decision-making disconnected from capacity."
          globalStep:
            name: "Phoenix becomes the lens"
            script: "Once Phoenix is on the board, use it as the narrative anchor. Every challenge that follows can now be interpreted through the question: why can't this organization deliver its most important work reliably?"
        - type: epic
          id: payroll-failure
          modalStep:
            name: "Failure becomes visible"
            script: "The payroll failure makes the risk undeniable. Operational dysfunction is no longer just an internal annoyance; it has produced a business-visible failure with real consequences."
          globalStep:
            name: "Consequences are now real"
            script: "Back on the board, the audience should feel the escalation. The organization is no longer simply stressed; it is producing public, costly failures that the business cannot ignore."
        # Now the challenges emerge
        - type: challenge
          id: firefighting
          modalStep:
            name: "Firefighting takes over"
            script: "Firefighting is the default operating mode. Planned work keeps losing to urgent work, so teams never stabilize, strategic work slips, and the system becomes even more reactive over time."
          globalStep:
            name: "Unplanned work dominates the board"
            script: "Once firefighting is placed back into the global view, show how it explains almost everything else. Urgent work is consuming capacity, crowding out planned work, and making reliable delivery impossible."
        - { type: challenge, id: no-visibility }
        - { type: challenge, id: knowledge-silos }
        - { type: challenge, id: blind-commitments }
        - { type: challenge, id: it-unreliable }
        # Early concept hints
        - { type: concept, id: four-types-unplanned }
        - { type: concept, id: first-way }

    - id: segment-2
      title: "Overload and the Cost of Multitasking"
      subtitle: "Early Mid — The system is overloaded; doing everything makes everything slower"
      start: "15:00"
      end: "25:00"
      phase: early-mid
      narrativeArc: "We are doing too much and it's breaking us"
      takeaway: "Not all work is equal — unplanned work silently consumes capacity and destabilizes everything else."
      summary: "As more obligations pile up, the team learns that overload is not just a morale problem but a structural one. This section connects multitasking, bottlenecks, and stalled delivery, showing how too much parallel work turns every priority into a delay."
      reveals:
        # New characters
        - { type: character, id: chris-allers }
        - { type: character, id: brent-geller }
        # Audit epic
        - { type: epic, id: audit-compliance }
        # Challenges
        - { type: challenge, id: high-wip }
        - { type: challenge, id: task-switching }
        - { type: challenge, id: stalled-projects }
        - { type: challenge, id: bottleneck-people }
        - { type: challenge, id: missed-deadlines }
        # The Four Types of Work
        - { type: concept, id: four-types-business }
        - { type: concept, id: four-types-internal }
        - { type: concept, id: four-types-changes }
        - { type: concept, id: four-types-unplanned }

    - id: segment-3
      title: "Bottlenecks and Flow"
      subtitle: "Mid — Performance is limited by constraints, not effort"
      start: "25:00"
      end: "35:00"
      phase: mid
      narrativeArc: "The system — not the people — is the problem"
      takeaway: "Improvement comes from managing constraints and enabling smooth flow, not pushing individuals harder."
      summary: "Erik reframes the crisis by shifting attention away from heroic effort and toward system constraints. This section introduces flow thinking: work must be managed through bottlenecks deliberately, or local optimization will keep producing global failure."
      reveals:
        # Erik enters as the mentor
        - { type: character, id: erik-reid }
        - { type: character, id: john-pesche }
        # Change freeze epic
        - { type: epic, id: project-freeze }
        # Challenges
        - { type: challenge, id: work-piles-up }
        - { type: challenge, id: long-lead-times }
        - { type: challenge, id: local-optimization }
        - { type: challenge, id: no-ownership }
        # The First Way
        - { type: concept, id: first-way }

    - id: segment-4
      title: "Quality, Feedback, and Risk Reduction"
      subtitle: "Late Mid — Speed without feedback creates instability"
      start: "35:00"
      end: "45:00"
      phase: late-mid
      narrativeArc: "We need feedback to prevent failure"
      takeaway: "You can't scale delivery without tight feedback loops and built-in quality."
      summary: "The narrative shifts from raw throughput to stability. Faster delivery only matters if teams can detect issues early, share responsibility across development and operations, and reduce the cost of failure through feedback and quality discipline."
      reveals:
        - { type: character, id: patty-mckee }
        - { type: character, id: sarah-moulton }
        # Unicorn / deployment pipeline epic
        - { type: epic, id: unicorn-project }
        # Challenges
        - { type: challenge, id: deployment-failures }
        - { type: challenge, id: late-detection }
        - { type: challenge, id: long-recovery }
        - { type: challenge, id: dev-ops-tension }
        # The Second Way
        - { type: concept, id: second-way }

    - id: segment-5
      title: "Learning Organization and Sustainable Performance"
      subtitle: "Late — Long-term success depends on culture, learning, and continuous improvement"
      start: "45:00"
      end: "55:00"
      phase: late
      narrativeArc: "We improve by learning continuously"
      takeaway: "High-performing organizations win by becoming learning systems, not just efficient ones."
      summary: "The final section turns improvement into a repeatable organizational habit. Sustainable performance comes from experimentation, blameless learning, and resilience practices that reduce dependence on heroics and make improvement part of the system itself."
      reveals:
        # Change freeze — disciplined process as the foundation for learning
        - { type: epic, id: project-freeze }
        # Challenges
        - { type: challenge, id: fear-of-failure }
        - { type: challenge, id: repeated-mistakes }
        - { type: challenge, id: heroics-over-systems }
        - { type: challenge, id: tech-debt-vs-features }
        # The Third Way
        - { type: concept, id: third-way }
        - { type: concept, id: four-types-business }

    - id: outro
      title: "The Transformation"
      subtitle: "From chaos to high performance"
      start: "55:00"
      end: "60:00"
      phase: outro
      reveals: []
