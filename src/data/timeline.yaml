# Timeline Configuration
# Controls the presentation flow - 60 minutes total
# Reveals are in narrative order — characters & epics first to set the scene,
# then challenges & concepts build on them. Order in the array = reveal order.
# Each reveal can optionally define two explicit script beats for the controls:
#   modalStep  — shown while the detail modal is on screen
#   globalStep — shown after the card is placed back into the dashboard
# Example:
# - type: character
#   id: bill-palmer
#   modalStep:
#     name: "Meet Bill Palmer"
#     script: "Bill inherits a crisis-ridden organization and becomes our lens into the crisis."
#   globalStep:
#     name: "Bill in context"
#     script: "Bill's story now anchors the broader system problems already visible on the board."

presentation:
  totalDuration: 60 # minutes
  segments:
    - id: intro
      title: "The Phoenix Project"
      subtitle: "A Novel About IT, DevOps, and Helping Your Business Win"
      start: "00:00"
      end: "05:00"
      phase: intro
      pageScript: "Before we meet Bill, set the stage: Parts Unlimited is falling behind, Phoenix is supposed to save it, and the company is running out of time."
      narrativeArc: "A struggling retailer bets its future on one giant program while the systems underneath it are already straining."
      reveals: []

    - id: segment-1
      title: "The Week Everything Breaks"
      subtitle: "Bill inherits a failing system, and three crises land at once"
      start: "05:00"
      end: "15:00"
      phase: early
      pageScript: "It is an ordinary Tuesday morning. Bill Palmer is driving to work thinking about network outages when HR calls, tells him Steve Masters wants to see him, and the whole story turns."
      contentSetupScript: "Before we place anyone on the board, frame the situation: Phoenix is late, the business is losing patience, and IT is already carrying more pressure than anyone can clearly see."
      narrativeArc: "One routine morning becomes the day Bill is summoned upstairs, handed the reins, and watches the first crisis detonate."
      takeaway: "The opening failure is not one bad incident; it is a system with no visibility, no enforced flow, and no spare capacity."
      summary: "Bill inherits IT as payroll fails, Phoenix slips, and the audit explodes. The point of the opening is not that one team made one mistake. It is that the organization cannot see or govern the work it has already taken on."
      reveals:
        - type: character
          id: bill-palmer
          modalStep:
            name: "Meet Bill Palmer"
            script: "When we first meet Bill, he is not the new VP yet. He is a director headed into work, worried about outages, expecting another hard day, not the collapse of his normal job."
          globalStep:
            name: "Bill inherits the whole system"
            script: "So place Bill on the board as a capable local operator. He understands his part of IT, but he is about to be dragged into the much larger story."
        - type: character
          id: steve-masters
          modalStep:
            name: "Meet Steve Masters"
            script: "Upstairs, Steve does not start with congratulations. He starts with the company: slipping results, a late Phoenix program, and a board that is running out of patience."
          globalStep:
            name: "Steve sets existential stakes"
            script: "That is the handoff that starts the story. Bill walks into Steve's office as an operations manager and walks out carrying survival-level stakes."
        - type: quote
          id: bill-talked-into-job
          modalStep:
            name: "Bill realizes what just happened"
            script: "Bill does not leave that meeting feeling chosen. He leaves stunned, already sensing that Steve has handed him far more than a title."
          globalStep:
            name: "Reluctance becomes responsibility"
            script: "Use the quote as the emotional pivot. The promotion is not a reward scene; it is the moment the story closes around him."
        - type: epic
          id: phoenix-project
          modalStep:
            name: "The project that changes everything"
            script: "Now widen the camera. Phoenix is the promise that is supposed to save the company, which is exactly why everyone is willing to risk too much for it."
          globalStep:
            name: "Phoenix becomes the lens"
            script: "From here on, every outage and shortcut gets more dangerous, because the company believes Phoenix must ship no matter what."
        - type: character
          id: sarah-moulton
          modalStep:
            name: "Meet Sarah Moulton"
            script: "Sarah enters as the voice of business impatience. She is not interested in technical nuance yet; she wants the launch, and she wants it on the promised date."
          globalStep:
            name: "Business pressure gets a voice"
            script: "That matters because Bill is no longer explaining risk into an open conversation. He is speaking into a room that has already decided speed is survival."
        - type: quote
          id: sarah-touching-story
          modalStep:
            name: "Sarah dismisses the complexity"
            script: "And then Sarah says the quiet part out loud. Bill is describing real rollout risk, and she cuts straight past it to keep the launch date intact."
          globalStep:
            name: "Risk gets reframed as excuse-making"
            script: "That line lands because it shows how quickly system reality gets reframed as hesitation once a deadline becomes a business promise."
        - type: epic
          id: payroll-failure
          modalStep:
            name: "Failure becomes visible"
            script: "Before Phoenix can even be brought under control, the ground gives way under payroll. The story does not wait politely for one crisis at a time."
          globalStep:
            name: "Consequences are now real"
            script: "Now the stakes change. IT is not merely late on strategy; it is failing at the basics in full view of the business."
        - type: character
          id: wes-davis
          modalStep:
            name: "Meet Wes Davis"
            script: "Wes gives the crisis its day-to-day texture. He is already living inside the outages, escalations, and impossible handoffs that the rest of the company only notices when something breaks."
          globalStep:
            name: "Heroics start to look normal"
            script: "With Wes on the board, the crisis becomes human. The organization stays upright by exhausting people until the exhaustion starts to look normal."
        - type: character
          id: brent-geller
          modalStep:
            name: "Meet the constraint"
            script: "And every path through the crisis seems to lead to Brent. The more the team relies on him to rescue each situation, the more fragile the whole system becomes."
          globalStep:
            name: "The system now has a face"
            script: "So Brent is not introduced as a hero to admire. He is introduced as evidence that the system is dangerously concentrated."
        - type: challenge
          id: firefighting
          modalStep:
            name: "Firefighting takes over"
            script: "This is the operating rhythm Bill inherits: interruption, escalation, recovery, repeat. Each emergency steals time from the work that might have prevented the next one."
          globalStep:
            name: "Unplanned work dominates the board"
            script: "Once firefighting is on the board, the rest of the segment stops looking like bad luck and starts looking like a pattern."
        - type: challenge
          id: no-visibility
          modalStep:
            name: "The simplest question has no answer"
            script: "Bill keeps asking what is in flight, what can wait, and where the capacity has gone. No one can answer cleanly, because no one can see the whole queue."
          globalStep:
            name: "Invisible demand drives bad decisions"
            script: "That is why the chaos compounds. A system you cannot see is a system you can only react to."
        - type: epic
          id: audit-compliance
          modalStep:
            name: "The audit proves it is systemic"
            script: "And just when the team might hope the trouble is confined to outages, the audit lands and proves the disorder reaches deep into controls and governance."
          globalStep:
            name: "Three pressures, one overloaded system"
            script: "End the opening block there: Phoenix is late, payroll has failed, and the audit confirms the chaos is systemic. That is the story Bill now has to lead through."

    - id: segment-2
      title: "Overload, Changes, and the Constraint"
      subtitle: "Visible work exposes impossible demand and fragile handoffs"
      start: "15:00"
      end: "25:00"
      phase: early-mid
      pageScript: "Once the first crisis is contained enough to breathe, Bill discovers the deeper problem is not a lack of effort. It is a system drowning in work it has already accepted."
      contentSetupScript: "On the empty board, hold this idea for a moment: once Patty starts tracking the work, the problem stops looking mysterious and starts looking measurable."
      narrativeArc: "Once the smoke clears enough to see the board, Bill discovers the real enemy is overload."
      takeaway: "When everything is in flight, the constraint breaks first and every handoff gets slower."
      summary: "Change cards, incident drills, and Phoenix failures reveal a shared pattern: too much work, too many interrupts, and one critical person absorbing all the risk. The system does not need more heroics; it needs fewer simultaneous commitments."
      reveals:
        - type: character
          id: patty-mckee
          modalStep:
            name: "Patty makes work visible"
            script: "Bill leans on Patty to impose change discipline, and Patty immediately tells him why it failed before: people are too busy to obey a system they do not trust."
          globalStep:
            name: "Evidence replaces opinion"
            script: "But once Patty makes the work visible, the argument changes. The team is no longer debating whether chaos exists; it can see the queue forming in front of it."
        - type: character
          id: erik-reid
          modalStep:
            name: "Erik gives Bill a new language"
            script: "Then Erik appears and changes the conversation again. He does not rush to solve Bill's incidents; he starts by questioning how Bill defines the work itself."
          globalStep:
            name: "Systems thinking enters the story"
            script: "That is why Erik matters. He is not handing Bill a checklist. He is teaching Bill how to see the system that produced the checklist."
        - type: quote
          id: erik-what-is-work
          modalStep:
            name: "Erik questions the definition of work"
            script: "This question is the hinge of the segment. Erik refuses to let Bill treat all demand as if it were the same kind of work."
          globalStep:
            name: "The question behind the framework"
            script: "Once that question is asked, the Four Types are almost inevitable. Until the team defines work properly, priority and capacity will keep collapsing into guesswork."
        - type: challenge
          id: high-wip
          modalStep:
            name: "Too much work, too little completion"
            script: "Once the work is visible, the next shock is volume. The organization has agreed to far more projects, changes, and interruptions than the system can possibly carry."
          globalStep:
            name: "The queue becomes the story"
            script: "So the story advances from hidden chaos to visible overload. Everyone is busy, but the queue keeps getting longer."
        - type: challenge
          id: bottleneck-people
          modalStep:
            name: "Brent must be protected"
            script: "Inside that overloaded system, the same name keeps surfacing: Brent. The lesson is no longer how to keep him busy, but how to stop wasting the one constraint everyone depends on."
          globalStep:
            name: "The constraint sets the pace"
            script: "That is the real shift in this block. Once the constraint sets the pace, the rest of the organization has to stop pretending it can work around it."
        - type: challenge
          id: incomplete-changes
          modalStep:
            name: "Partial work clogs the system"
            script: "Then Patty's boards reveal something even uglier: too much work enters the system and never exits cleanly. The organization is clogged with partial work."
          globalStep:
            name: "Busy is not the same as done"
            script: "This is why the team feels exhausted without feeling effective. Handovers, reversions, and half-finished changes consume capacity without producing completion."
        - type: concept
          id: four-types-overview
          modalStep:
            name: "The Four Types of Work"
            script: "Now Bill finally gets the frame that makes the chaos legible. Not all demand is the same, and until the team separates the types of work, it cannot manage trade-offs honestly."
          globalStep:
            name: "The team finally has a shared map"
            script: "The Four Types do not solve the overload by themselves, but they give Bill and the team their first shared map of the system they are trying to lead."

    - id: segment-3
      title: "Unplanned Work, Flow, and the Freeze"
      subtitle: "The team stops treating symptoms and starts managing the system"
      start: "25:00"
      end: "35:00"
      phase: mid
      narrativeArc: "The breakthrough comes when Bill can finally name the system's real enemy."
      takeaway: "Unplanned work destroys planned work, so flow improves only when the constraint sets the pace."
      summary: "Bill connects incidents, debt, and overload into one system. Erik gives him the language of constraints, Steve starts behaving like a partner, and the project freeze becomes the first serious act of capacity management."
      reveals:
        - type: character
          id: chris-allers
          modalStep:
            name: "Development has to join the system view"
            script: "Chris stands in for Development, which has been optimizing its own goals while Operations absorbs the consequences. His shift matters because flow cannot improve inside one silo."
          globalStep:
            name: "Blame gives way to coordination"
            script: "When Bill and Chris start talking about the same system instead of defending different teams, the story turns from blame to coordination."
        - type: epic
          id: project-freeze
          modalStep:
            name: "The freeze is a systems decision"
            script: "The project freeze sounds backwards, but it is the first honest response to overload. Stop feeding the system so the system can recover."
          globalStep:
            name: "Slowing intake creates leverage"
            script: "This is the pivot point of the book. Slowing intake is not surrender; it is how the organization gets leverage back."
        - type: challenge
          id: work-piles-up
          modalStep:
            name: "Queues write the real schedule"
            script: "Queues build at the constraint whether or not anyone admits it. That means the true schedule is written by waiting time, not by the plan."
          globalStep:
            name: "The blockage becomes visible"
            script: "Once we see work piling up, we stop asking why smart people are behind and start asking where flow is actually being blocked."
        - type: concept
          id: four-types-unplanned
          modalStep:
            name: "Unplanned work is the destroyer"
            script: "Unplanned work is the category that explains why every other promise keeps slipping. It steals capacity immediately and then demands even more cleanup later."
          globalStep:
            name: "The enemy now has a name"
            script: "This is the moment the book clarifies itself. The organization is not merely busy; it is repeatedly sacrificing planned work to unplanned work."
        - type: concept
          id: first-way
          modalStep:
            name: "The First Way"
            script: "The First Way gives the principle underneath all of this: optimize for flow across the whole system. Protect the constraint, reduce batch size, and stop passing defects downstream."
          globalStep:
            name: "Flow explains the opening chaos"
            script: "Now the earlier crises become legible. The opening chaos was not random. It was what a low-flow system looks like under pressure."

    - id: segment-4
      title: "Feedback, Quality, and Business Risk"
      subtitle: "Quality improves when feedback loops get shorter and business context gets clearer"
      start: "35:00"
      end: "45:00"
      phase: late-mid
      narrativeArc: "The organization starts making better decisions when it can see both the work and the business impact."
      takeaway: "Quality is not just testing harder. It is shortening feedback loops, reducing handoff delay, and tying IT work to business outcomes."
      summary: "John's audit scoping insight, Patty's kanbans, and Maggie's business pressure all point to the same lesson: fast feedback and disciplined handoffs reduce risk faster than big heroic releases ever can."
      reveals:
        - type: character
          id: john-pesche
          modalStep:
            name: "John's arc becomes useful"
            script: "John's later arc matters because compliance finally becomes useful instead of performative. He starts asking where risk is actually detected, not just where paperwork exists."
          globalStep:
            name: "Compliance becomes feedback"
            script: "That shift turns audit work into feedback. The goal is no longer to prove control on paper; it is to reduce business risk in reality."
        - type: quote
          id: john-orange-jumpsuits
          modalStep:
            name: "John explains the urgency"
            script: "This quote makes John more understandable. He is abrasive, but he is reacting to legal and governance risk he believes the rest of IT is underestimating."
          globalStep:
            name: "Compliance gets a business motive"
            script: "Once that motive is visible, John's arc can turn from obstruction into useful discipline. He is trying to protect the business, even if he does it badly at first."
        - type: character
          id: maggie-lee
          modalStep:
            name: "The business test returns"
            script: "Maggie brings the commercial test back into the room. If Phoenix is still slow, still incomplete, and still missing the market window, then technical activity is not the same as business progress."
          globalStep:
            name: "Value becomes the scoreboard"
            script: "Her role keeps the story honest. The measure is not how much IT did; the measure is whether the business can move faster."
        - type: challenge
          id: failed-handoffs
          modalStep:
            name: "Handoffs create hidden delay"
            script: "A forty-five minute task can become a multi-week delay when it crosses too many teams. In this part of the book, queue time matters more than touch time."
          globalStep:
            name: "Waiting becomes the real cost"
            script: "That is the handoff lesson in one line: a busy system does not just work slower, it waits longer between every step."
        - type: challenge
          id: deployment-failures
          modalStep:
            name: "Every release feels like a gamble"
            script: "Deployments keep failing because the organization is still learning too late. Big batches, shaky environments, and inconsistent release discipline make every release feel like a gamble."
          globalStep:
            name: "Release risk is designed in"
            script: "The important point is not that releases are risky. It is that the system was built to discover risk at the most expensive moment."
        - type: challenge
          id: late-detection
          modalStep:
            name: "Feedback arrives too late"
            script: "Late detection is what turns ordinary mistakes into executive crises. When feedback arrives after release, every defect costs more and teaches less."
          globalStep:
            name: "Quality now depends on timing"
            script: "This sets up the next principle cleanly: quality improves when feedback loops get shorter, earlier, and harder to ignore."
        - type: concept
          id: second-way
          modalStep:
            name: "The Second Way"
            script: "The Second Way is feedback. Build loops that expose problems early, share responsibility, and make quality everyone's job."
          globalStep:
            name: "Feedback turns discipline into learning"
            script: "With feedback in place, the organization can finally improve on purpose instead of only learning through outages."

    - id: segment-5
      title: "Automation, Experimentation, and Strategic Ownership"
      subtitle: "Unicorn proves the model, and learning becomes an organizational capability"
      start: "45:00"
      end: "55:00"
      phase: late
      narrativeArc: "The ending matters because the team stops treating IT as a cost center and starts treating it as strategic capability."
      takeaway: "High performance comes from automation, safe experimentation, and owning the capabilities that set the pace of the business."
      summary: "Unicorn, cloud elasticity, chaos practices, and the outsourced MRP constraint all reinforce the same conclusion: sustainable performance comes from building a learning system, not from relying on a few exhausted experts. That is why Bill ends the book closer to enterprise leadership than to firefighting."
      reveals:
        - type: epic
          id: unicorn-project
          modalStep:
            name: "Unicorn proves the model"
            script: "Unicorn is the proof that the model works. Smaller batches, better automation, and tighter feedback turn delivery into a repeatable capability instead of a crisis event."
          globalStep:
            name: "The transformation is now visible"
            script: "Unicorn matters because it shows the change is not theoretical. The same organization can move differently once the system changes."
        - type: quote
          id: steve-flow-forward
          modalStep:
            name: "Steve finally speaks the language of flow"
            script: "This late quote matters because it shows the leadership language has changed. Steve is no longer asking only for speed; he is starting to recognize waste, rework, and direction of flow."
          globalStep:
            name: "The executive view has matured"
            script: "That is a real transformation beat. The CEO now sounds like someone who has internalized systems thinking instead of only applying pressure."
        - type: epic
          id: project-narwhal
          modalStep:
            name: "Practice failure safely"
            script: "Narwhal pushes the team one step further: do not just survive failure, practice it safely. Controlled experiments build resilience faster than wishful thinking."
          globalStep:
            name: "Learning becomes a habit"
            script: "This is the moment the culture really changes. Failure becomes something the team studies and learns from, not something it hides."
        - type: challenge
          id: vendor-lock-in
          modalStep:
            name: "The constraint moves outside IT"
            script: "By the end, the constraint does not disappear; it moves. Outsourced platforms and slow partners become the new limit on strategy."
          globalStep:
            name: "Strategic capabilities must be owned"
            script: "That is a mature systems insight. If a capability sets the pace of the business, owning it eventually matters."
        - type: challenge
          id: heroics-over-systems
          modalStep:
            name: "Do not celebrate the wrong thing"
            script: "The final enemy is the temptation to celebrate heroes instead of fixing the system. Heroics are dramatic, but they are not scalable."
          globalStep:
            name: "Less heroism, more capability"
            script: "The book closes that loop deliberately. The goal is not to find better firefighters; it is to need fewer fires."
        - type: concept
          id: third-way
          modalStep:
            name: "The Third Way"
            script: "The Third Way is continuous learning. Practice, experimentation, blameless review, and resilience work are what make improvement durable."
          globalStep:
            name: "Learning becomes a business capability"
            script: "That is the destination of the book: IT becomes a business capability when learning is built into the way work happens."

    - id: outro
      title: "The Transformation"
      subtitle: "From firefighting to strategic capability"
      start: "55:00"
      end: "60:00"
      phase: outro
      reveals: []
