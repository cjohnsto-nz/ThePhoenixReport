# Timeline Configuration
# Controls the presentation flow - 60 minutes total
# Reveals are in narrative order — characters & epics first to set the scene,
# then challenges & concepts build on them. Order in the array = reveal order.
# Each reveal can optionally define two explicit script beats for the controls:
#   modalStep  — shown while the detail modal is on screen
#   globalStep — shown after the card is placed back into the dashboard

presentation:
  totalDuration: 60 # minutes
  segments:
    - id: intro
      title: "The Phoenix Project"
      subtitle: "A Novel About IT, DevOps, and Helping Your Business Win"
      start: "00:00"
      end: "05:00"
      phase: intro
      pageScript: >-
        Parts Unlimited is a four-billion-dollar company that is losing market share,
        bleeding confidence on Wall Street, and running out of time. The board has
        forced leadership changes. The competition keeps shipping capabilities that Parts
        Unlimited cannot match. And the company has staked its survival on one giant
        transformation program called Phoenix, which is already years late. This is the
        story of how that pressure collides with an IT organisation that cannot yet see
        the system it is trying to run.
      narrativeArc: >-
        A struggling retailer bets its future on one giant program while the systems
        underneath it are already straining.
      reveals: []

    - id: segment-1
      title: "The Week Everything Breaks"
      subtitle: "Bill inherits a failing system, and three crises land at once"
      start: "05:00"
      end: "15:00"
      phase: early
      pageScript: >-
        It is a Tuesday morning in September. Bill Palmer is driving to work at Parts
        Unlimited, thinking about network outages and his three-year-old son's doctor
        appointment, when the Vice President of Human Resources calls and asks him to
        come in immediately. Bill assumes he is about to be fired.
      contentSetupScript: |-
        He is not about to be fired. He is about to be promoted into the worst job in the company. And over the next few days he will be hit by a payroll failure, a Phoenix showdown, and a crushing audit report that all point to the same underlying problem.
      narrativeArc: >-
        One routine morning becomes the day Bill is summoned upstairs, handed the reins,
        and watches the first crises detonate.
      takeaway: >-
        The opening failures are not isolated mistakes. They are the symptoms of a system
        with no visibility, no enforced flow, and no spare capacity.
      summary: >-
        Bill's first days teach the book's opening lessons the hard way. Reliability failures
        become business crises immediately. Changes nobody can see cannot be governed.
        Urgency without discipline creates bigger outages, not faster delivery. And Phoenix
        plus the audit show that the company is suffering from systemic governance debt, not
        one isolated mistake.
      reveals:
        - type: "character"
          id: "bill-palmer"
          modalStep:
            name: "Meet Bill Palmer"
            script: |-
              Bill Palmer is the director of midrange technology operations. He is an ex-Marine, proud of the tight team he has built over ten years, and he has absolutely no ambition to become one of those executives who spend all day in meetings and PowerPoint reviews. 
          globalStep:
            name: "Bill before the promotion"
            script: |-
              HR walks Bill to the CEO's floor and into Steve Masters' office. 
        - type: "character"
          id: "steve-masters"
          modalStep:
            name: "Meet Steve Masters"
            script: |-
              Steve is a former Army major, direct, calm, and already under extraordinary pressure. He tells Bill that the CIO and Bill's boss are both gone. Then he lays out the stakes: the stock is down, the board is losing patience, and he has roughly six months to turn things around or four thousand people may lose their jobs.
          globalStep:
            name: "Steve sets the stakes"
            script: |-
              This is not a congratulations scene. Steve is not offering Bill a prize. He is telling him that the company is in trouble, Phoenix is late, and leadership is out of time.
        - type: "quote"
          id: "bill-talked-into-job"
          modalStep:
            name: "Bill realises what just happened"
            script: |-
              Steve looks Bill in the eye and says, I need you to help me save this great company. Can I count on you? Bill says yes, and the moment he leaves the office he realises he has just accepted a job he never wanted.
          globalStep:
            name: "Reluctance becomes responsibility"
            script: |-
              Steve tells Bill that Phoenix is essential to the company's survival. 
        - type: "epic"
          id: "phoenix-project"
          modalStep:
            name: "The project that carries the company"
            script: |-
              Phoenix is the big omni-channel transformation that is supposed to let customers buy wherever they want, in stores or online. It is already years late, investors are howling, and the entire company has started to behave as if Phoenix must ship no matter what else breaks.
          globalStep:
            name: "Phoenix becomes the lens"
            script: |-
              From this point forward, every outage, shortcut, and delay becomes more dangerous, because the business believes Phoenix is the program that will save everything else.
        - type: "epic"
          id: "payroll-failure"
          modalStep:
            name: "Payroll fails on Bill's first day"
            script: |-
              Before Bill can even figure out where his new office is, Steve hands him an email from Dick Landry, the CFO. Payroll is failing. Hourly employees' records are corrupted. If the issue is not fixed by five PM, thousands of workers may miss their paychecks, the union may erupt, and the company will be on the front page for all the wrong reasons.
          globalStep:
            name: "The first crisis is already live"
            script: |-
              So Bill's first act as vice president is not strategy, budgeting, or planning. It is emergency triage with real people's mortgages and groceries on the line. Bill makes his way to the payroll war room.
        - type: "character"
          id: "patty-mckee"
          modalStep:
            name: "Meet Patty McKee"
            script: |-
              In the payroll war room, Bill meets Patty McKee. Patty is quiet, precise, and methodical. She runs IT Service Support and becomes the person who can turn a room full of anxiety into something that looks like a process. She is not introduced as an abstract champion of discipline. She first appears in the middle of a live business crisis, trying to bring order to chaos.
          globalStep:
            name: "Patty starts to make chaos legible"
            script: |-
              That first impression matters. Patty's role in the book is not to add more bureaucracy. It is to give Bill a way to see the work clearly enough to manage it.
        - type: character
          id: wes-davis
          modalStep:
            name: "Meet Wes Davis"
            script: >-
              Wes Davis arrives with all the energy of a man who has been fighting outages
              for too long. He is loud, skeptical, overloaded, and immediately hostile to Bill's
              promotion. But Wes also gives the crisis its texture. He is already living inside
              the escalations and impossible handoffs that the rest of the company only
              notices when something explodes.
          globalStep:
            name: "Wes embodies the firefighting culture"
            script: >-
              With Wes on the board, the crisis becomes human. The organisation is staying
              upright by exhausting people until the exhaustion starts to look normal.

        - type: character
          id: brent-geller
          modalStep:
            name: "Meet Brent Geller"
            script: >-
              During payroll and the storage crisis that follows, one name keeps surfacing:
              Brent. Brent Geller is the engineer everyone depends on. He sits in a six-cubicle
              command centre surrounded by monitors, and every critical path seems to run
              through him. The vendors cannot fix the SAN without him. The teams cannot move
              without him. Even Bill starts asking, Brent, Brent, Brent. Can't we do anything
              without him?
          globalStep:
            name: "The system now has a face"
            script: >-
              Brent is not introduced as a hero to celebrate. He is introduced as evidence
              that the system is dangerously concentrated in one person's head.

        - type: character
          id: sarah-moulton
          modalStep:
            name: "Meet Sarah Moulton"
            script: >-
              Once payroll is barely under control, Sarah Moulton enters the story. Sarah is
              the Senior Vice President of Retail Operations, and she speaks for a business
              that has been promised Phoenix for years. She does not arrive asking for nuance.
              She arrives demanding a date.
          globalStep:
            name: "Business pressure gets a voice"
            script: >-
              Sarah matters because Bill is no longer explaining technical risk into an open
              conversation. He is speaking into a room that has already decided speed is
              survival.

        - type: quote
          id: sarah-touching-story
          modalStep:
            name: "Sarah refuses the technical explanation"
            script: >-
              Bill tries to explain the real operational constraints behind Phoenix, and Sarah
              cuts straight through him. Bill, that's a touching story, but we're not
              discussing water fountains, we're discussing Phoenix. In one line she reframes
              system reality as excuse-making.
          globalStep:
            name: "Risk gets reframed as hesitation"
            script: >-
              That quote lands because it shows how quickly genuine technical risk gets
              dismissed once a deadline has become a business promise.

        - type: challenge
          id: firefighting
          modalStep:
            name: "Firefighting becomes the operating model"
            script: >-
              Look at Bill's first week as a whole. Promotion, payroll, outages, Phoenix,
              escalations. The rhythm is interruption, recovery, and then the next emergency.
              Every crisis steals time from the work that might have prevented the next one.
          globalStep:
            name: "Unplanned work dominates the board"
            script: >-
              Once firefighting is visible, the week stops looking like bad luck. It starts
              looking like a system that generates its own emergencies.

        - type: challenge
          id: no-visibility
          modalStep:
            name: "Nobody can see the full queue"
            script: >-
              Bill keeps asking the simplest possible management questions. What is in
              flight? What can wait? Where has the capacity gone? Nobody can answer cleanly,
              because work is scattered across spreadsheets, emails, and people's heads. There
              is no shared view of demand.
          globalStep:
            name: "Invisible work drives every bad decision"
            script: >-
              This is the deepest problem in the opening. A system you cannot see is a system
              you can only react to, and reaction is all this organisation has left.

        - type: "epic"
          id: "audit-compliance"
          modalStep:
            name: "The audit proves the disorder is systemic"
            script: |-
              Then Nancy Mailer delivers the final blow: a massive audit report with hundreds of IT control deficiencies and the threat of material weaknesses. Up until now, the team could pretend the damage was limited to outages and delays. The audit proves the disorder runs much deeper, into governance and financial reporting.
          globalStep:
            name: "Three pressures, one overloaded system"
            script: |-
              Phoenix is late, payroll has failed, and the audit says the chaos is structural. Bill is not inheriting three separate problems. He is inheriting one broken system seen from three different angles.
    - id: segment-2
      title: "Overload, Changes, and the Constraint"
      subtitle: "Visible work exposes impossible demand and fragile handoffs"
      start: "15:00"
      end: "25:00"
      phase: early-mid
      pageScript: >-
        Once the first wave of crises settles down enough to breathe, Bill starts looking
        for the deeper cause. He expected to find a few broken processes. What he actually
        finds is a system drowning in work it has already accepted.
      contentSetupScript: >-
        This is where the story changes from incident response to diagnosis. Patty gives
        Bill numbers. Erik gives him language. And together they make the chaos measurable.
      narrativeArc: >-
        Once the smoke clears enough to see the board, Bill discovers the real enemy is
        overload.
      takeaway: >-
        When everything is in flight, the constraint breaks first, handoffs get slower,
        and even obvious staffing problems will be dismissed if the business sees IT as
        cost instead of value.
      summary: >-
        This section is where the system becomes measurable. Bill learns that demand is far
        larger than anyone has admitted, that Brent is functioning as the constraint for both
        project work and operational work, and that the change board has exposed a whole class
        of work the company was barely counting. He also learns something wider than staffing:
        when executives experience IT mainly as high cost and weak delivery, even a correct
        capacity diagnosis will not automatically earn more support. By the end of the block,
        the team can see the overload clearly, but the business still drives Phoenix toward
        launch anyway.
      reveals:
        - type: "character"
          id: "erik-reid"
          modalStep:
            name: "Meet Erik Reid"
            script: |-
              Bill goes to a meeting and mistakes Erik Reid for the doughnut delivery man. Erik is kneeling on the floor unpacking Vandal Doughnuts, wearing wrinkled khakis and an untucked denim shirt. Then he stands up, introduces himself, and Bill realises he is talking to the board candidate who is about to become his mentor. Erik's role in the story is not to hand Bill a quick fix. He gives Bill an assignment: learn to see the different kinds of work entering IT, and then learn the principles that govern how that work must flow.
          globalStep:
            name: "Erik changes the conversation"
            script: |-
              Erik does not start by telling Bill how to fix payroll or Phoenix. He takes him to the MRP-8 plant, shows him piles of work in front of the heat-treat oven, and teaches him to see IT as a flow system with constraints. From then on, Erik keeps giving Bill two linked lessons: first, name the work correctly; then learn the ways a healthy system manages that work.
        - type: "quote"
          id: "erik-what-is-work"
          modalStep:
            name: "Erik asks the question Bill cannot yet answer"
            script: |-
              Erik ends the plant visit with a deceptively simple question: what then, exactly, is your definition of work? Bill has been managing tasks, outages, and promises without a clear model of what kind of demand is entering the system.
          globalStep:
            name: "The question behind the framework"
            script: |-
              Erik leaves Bill with a slip of paper and a challenge: you have named one type of work, now go find the other three. After that meeting, Bill can feel the shape of the framework, but he still cannot name the last, most destructive category.
        - type: challenge
          id: high-wip
          modalStep:
            name: "Patty and Wes reveal the impossible math"
            script: >-
              Patty and Wes put the project list in front of Bill. More than a hundred active
              projects for about a hundred and fifty people, while break-fix work is already
              consuming most of the team's time. The shocking thing is not just the volume.
              It is that nobody had ever put the total demand in one place before.
          globalStep:
            name: "Overload becomes visible"
            script: >-
              This is the turning point from intuition to evidence. The organisation is not
              failing because people do not care. It is failing because it has said yes to far
              more work than it can physically carry.

        - type: challenge
          id: value-blind-staffing
          modalStep:
            name: "Bill discovers the staffing problem is also a value problem"
            script: >-
              This lands in Chapter 8, after Bill has real demand-and-capacity numbers. He goes
              to Steve and makes the case plainly: Phoenix and the audit are competing for the
              same scarce people, the team is definitely understaffed, and either the project
              list must shrink or IT has to staff up. Steve's answer is brutal. IT is already
              expensive, Phoenix is over budget, and new headcount is off the table.
          globalStep:
            name: "The company sees IT as cost before value"
            script: >-
              This is the moment Steve pushes the conflict into the open. He tells Bill that if
              anything, they may have to cut heads in IT, not add them. In the book, that is
              the executive logic Bill is fighting: the company experiences IT as high cost and
              low value, so even a correct staffing diagnosis does not automatically earn more
              staff. It raises the threat of layoffs and outsourcing instead.

        - type: challenge
          id: bottleneck-people
          modalStep:
            name: "The constraint has a name"
            script: >-
              Once the work is visible, the same name keeps appearing at the point where
              everything slows down: Brent. Patty discovers that many scheduled changes never
              complete because they are all waiting on one person. Brent is not just busy. He
              is the constraint that determines the pace of the whole system.
          globalStep:
            name: "Brent must be protected"
            script: >-
              This is where Bill's management problem changes shape. The question is no
              longer how to make Brent work harder. The question is how to stop wasting the
              one constraint everyone depends on.

        - type: challenge
          id: incomplete-changes
          modalStep:
            name: "Changes go in but never come out"
            script: >-
              Patty's change boards reveal something even uglier than overload. Work is
              entering the system and staying there. Changes are half-finished, waiting on
              handoffs, reversions, approvals, or Brent. The team jokes that they are the
              Bates Motel of changes: changes check in, but they do not check out.
          globalStep:
            name: "Busy is not the same as done"
            script: >-
              That line captures the whole feeling of this section. Everyone is exhausted,
              but almost nothing is truly finishing. The system is burning capacity without
              producing completion.

        - type: concept
          id: four-types-business
          modalStep:
            name: "The first type of work"
            script: >-
              Bill finally starts naming the demand. The first type is business project work:
              the visible initiatives that executives care about, like Phoenix. These are the
              projects everyone talks about, funds, and tracks.
          globalStep:
            name: "Not all demand is the same"
            script: >-
              That sounds obvious, but it matters because the organisation has been treating
              every request as if it belonged to one giant undifferentiated queue.

        - type: concept
          id: four-types-internal
          modalStep:
            name: "The second type of work"
            script: >-
              The second type is internal IT work: upgrades, migrations, automation, and
              infrastructure changes. This work is often invisible to the business, which
              makes it easy to defer, even though it is what keeps the first type possible.
          globalStep:
            name: "Invisible support work matters"
            script: >-
              Once Bill sees internal projects as a distinct class of work, he can explain why
              starving them eventually makes every business promise harder to keep.

        - type: concept
          id: four-types-changes
          modalStep:
            name: "The third type of work"
            script: >-
              The third type is changes: the routine operational modifications required to
              keep systems running. These look small in isolation, but when they are badly
              managed they create outages, rework, and more demand than the system can absorb.
          globalStep:
            name: "Routine work can still destabilise the system"
            script: >-
              This is why Patty's boards matter so much. Change work is not background noise.
              It is a major source of both risk and load. But even here, Bill still has not
              solved Erik's puzzle. He can feel there is one more destructive category he has
              not yet learned to name.

    - id: segment-3
      title: "Unplanned Work, Flow, and the Freeze"
      subtitle: "The team stops treating symptoms and starts managing the system"
      start: "25:00"
      end: "35:00"
      phase: mid
      pageScript: >-
        After weeks of escalation from Sarah, commitments to the board and analysts, and a
        constant drumbeat that Phoenix must restore growth, the launch date stops feeling
        optional. Bill and Wes keep warning that the release is reckless, but the company
        has turned Phoenix into a promise it believes it must keep. In the book, Sarah sets
        the marketing launch for Saturday, September 13, with Phoenix deploying at 5 p.m.
        the previous day. The deployment goes ahead despite every warning sign, and it turns
        into a public disaster.
      contentSetupScript: >-
        This is the emotional low point of the book. Stores are affected, journalists are
        calling, Steve wants normal operations restored immediately, and Sarah is still
        pushing for Phoenix fixes while recovery work swallows the team. Bill nearly quits.
        The team nearly collapses. And then, almost unexpectedly, the story turns.
      narrativeArc: >-
        The breakthrough comes when Bill can finally name the system's real enemy.
      takeaway: >-
        Unplanned work destroys planned work, so flow improves only when the constraint sets
        the pace.
      summary: >-
        Phoenix's fallout teaches Bill what unplanned work really is: anti-work that burns up
        everything the company meant to do. Erik then helps him connect Brent, technical debt,
        and overloaded commitments into one system problem. The breakthrough is not another
        heroic recovery. It is the leadership decision to freeze new work and finally manage
        according to capacity and flow.
      reveals:
        - type: challenge
          id: business-pressure
          modalStep:
            name: "Phoenix becomes a promise the company feels it cannot break"
            script: >-
              This is the pressure that leads directly into go-live. Sarah keeps repeating
              that the competition is not standing still and that every day costs market
              share. Steve is making commitments upward to the board and outward to analysts.
              By now, Phoenix is no longer being discussed as a risky release that might be
              delayed. It is being treated as proof that the company still has a future.
          globalStep:
            name: "The pressure does not end when Phoenix launches"
            script: >-
              That is what makes the failure so brutal in the book. After the button is
              pressed, the pressure keeps coming. Stores still need to operate, the press is
              calling, customers are suffering, Steve wants normal business restored, and
              Sarah is still pushing for fixes while Bill's team is barely keeping the system
              alive.

        - type: challenge
          id: ground-floor-disconnect
          modalStep:
            name: "The launch fails where the business actually lives"
            script: >-
              The main consequence is not abstract system instability. By Saturday morning,
              stores cannot transact normally. The in-store POS systems are down, so staff
              fall back to manual tills and manual card swipes, carbon-copy receipts get
              stuffed into shoeboxes, people run out for more supplies and change, and the
              phones in IT light up with calls from roughly a hundred and twenty stores. This
              is the ground-floor reality the launch decision had lost touch with.
          globalStep:
            name: "IT failure becomes frontline business failure"
            script: >-
              This is one of the book's clearest lessons. IT systems directly shape whether
              employees can serve customers and whether the company can actually sell
              anything. Once the stores fall back to paper and manual work, you can no longer
              pretend technology failure is merely a technical problem.

        - type: challenge
          id: order-integrity-collapse
          modalStep:
            name: "The damage spreads from performance to trust"
            script: >-
              The fallout keeps widening. Some online customers find the site unusable. Others
              arrive at stores and discover their transactions were lost, or worse, that they
              were charged twice or three times. Finance opens another war room to process
              piles of faxed problem orders, engineers have to build emergency tools for the
              backlog, and then the website starts exposing customer credit card numbers when
              sessions crash.
          globalStep:
            name: "Phoenix becomes a public fiasco"
            script: >-
              By this point the launch has become more than a bad deployment. It is a customer
              trust problem, a data integrity problem, a security breach, a finance problem,
              and a press story all at once. That is why the recovery effort swallows the
              organisation whole.

        - type: character
          id: chris-allers
          modalStep:
            name: "Chris stops acting like the other side"
            script: >-
              After the Phoenix disaster, Chris Allers, the head of development, does
              something new. He apologises to Bill and agrees to meet with him regularly.
              That sounds small, but in this book it is huge. For the first time, Development
              and Operations start talking about the same system instead of defending their
              own silos.
          globalStep:
            name: "Blame gives way to coordination"
            script: >-
              Chris matters here because no amount of operational excellence can save a value
              stream that is still organised around rivalry and blame.

        - type: challenge
          id: no-ownership
          modalStep:
            name: "Bill reaches breaking point"
            script: >-
              Then comes the invoicing crisis and a fifty-million-dollar cash shortfall. Bill
              runs a disciplined investigation, but Steve barges in with an all-hands-on-
              keyboards order that destroys the team's focus. Bill finally snaps and resigns.
              He does it because he has been given responsibility without authority, and he
              knows the system cannot be fixed that way.
          globalStep:
            name: "Authority and accountability finally collide"
            script: >-
              Bill's resignation is the emotional pivot of the story. When Steve eventually
              talks him back, the relationship changes. Bill is no longer just absorbing
              executive pressure. Steve now understands that leadership behaviour is part of
              the system too.

        - type: epic
          id: project-freeze
          modalStep:
            name: "The project freeze"
            script: >-
              Steve pulls the senior leadership group into an offsite, with Bill, Dick,
              Sarah, John, and the other leaders who have been battering one another over
              Phoenix finally forced to sit in the same room and talk honestly. The team
              becomes honest with one another in a way it never has before. Personal stories
              get told. Trust starts to form. And when they come out, they announce a project
              freeze: stop launching more work until the system can actually finish what it
              has already started.
          globalStep:
            name: "Stopping becomes the first real systems decision"
            script: >-
              The freeze sounds backwards, but it is the first honest response to overload.
              In the first week after it begins, the team gets more done than it normally does
              in an entire month.

        - type: challenge
          id: work-piles-up
          modalStep:
            name: "Queues write the real schedule"
            script: >-
              Once intake slows down, the team can finally see where the backlog actually
              forms. Work piles up at the constraint whether or not anyone wants to admit it.
              That means the true schedule is written by waiting time, not by the plan in a
              status deck.
          globalStep:
            name: "The blockage becomes visible"
            script: >-
              This is the moment the conversation changes from why are smart people behind
              to where, exactly, is flow being blocked.

        - type: concept
          id: four-types-unplanned
          modalStep:
            name: "Bill finally names the fourth type"
            script: >-
              This is where the book places the realization. After Phoenix blows up and Patty's
              board shows that planned changes did not get finished because recovery work took
              over, Bill finally sees what Erik meant. The fourth type is unplanned work:
              incidents, outages, recovery, escalations. It is the most destructive because it
              does not merely compete with planned work. It prevents planned work from being
              done at all.
          globalStep:
            name: "The puzzle Erik gave him clicks into place"
            script: >-
              Bill did not understand this back at the plant. He had to live through the
              Phoenix fiasco, watch unplanned work clear the board, and then call Erik with
              the answer. Only here does the framework become fully real to him.

        - type: challenge
          id: local-optimization
          modalStep:
            name: "Every team was optimising the wrong thing"
            script: >-
              Erik helps Bill see that each group has been chasing its own local metrics.
              Development optimises feature output, Operations optimises uptime, Security
              optimises findings, and nobody is optimising the whole path from idea to value.
          globalStep:
            name: "Local wins create global losses"
            script: >-
              This is the point where Erik's first big lesson lands. Bill has now seen the
              constraint, the queue, the damage from unplanned work, and the failure of each
              silo to optimise the whole. That is what teaches him the First Way: start with
              flow across the entire system, not local efficiency inside each team.

        - type: concept
          id: first-way
          modalStep:
            name: "The First Way"
            script: >-
              The First Way is flow. Optimise the movement of work from left to right across
              the whole system. Protect the constraint. Reduce work in progress. Stop passing
              defects downstream. In other words, stop asking each team to look efficient and
              start asking the whole system to move work cleanly.
          globalStep:
            name: "Flow explains the opening chaos"
            script: >-
              Now the earlier crises become legible. The payroll failure, the Phoenix
              disaster, the endless escalations — they were not random. They were what a
              low-flow system looks like under pressure.

    - id: segment-4
      title: "Feedback, Quality, and Business Risk"
      subtitle: "Quality improves when feedback loops get shorter and business context gets clearer"
      start: "35:00"
      end: "45:00"
      phase: late-mid
      pageScript: >-
        Once flow starts improving, the next question is how to keep quality from collapsing
        under speed. The audit storyline becomes crucial here, because the company learns
        something surprising: not every scary IT finding is where the real financial risk
        lives. To understand that, Bill has to watch John, Finance, Audit, and Erik collide.
      contentSetupScript: >-
        The first half of this section belongs to John. He begins as the man with the binder,
        convinced that more controls and more urgency must mean more safety. What changes him
        is learning to trace the full business process and seeing where the company is
        actually relying on controls to catch material error.
      narrativeArc: >-
        The organisation starts making better decisions when it can see both the work and
        the business impact, and when it learns which controls genuinely matter.
      takeaway: >-
        Quality is not just testing harder. It is shortening feedback loops, reducing
        handoff delay, and tying both controls and engineering work to the business outcome
        they are meant to protect.
      summary: >-
        The freeze proves that focus helps, but Patty's analysis shows the harder truth: work still
        dies in queues, handoffs, and undocumented dependencies. At the same time, Bill and John
        learn to trace IT problems all the way to sales, stockouts, reporting, and audit scope. By
        the end of this block, quality stops meaning 'inspect harder later' and starts meaning
        shorter feedback loops, clearer release control, and business-aligned countermeasures.
      reveals:
        - type: character
          id: john-pesche
          modalStep:
            name: "John arrives carrying the compliance worldview"
            script: >-
              John Pesche enters the story as the person nobody in Operations wants in the
              room. He carries the binder, talks in audit language, fast-tracks urgent control
              work, and genuinely believes he is protecting the company from catastrophe. The
              important thing is that John is not a caricature. He is directionally right that
              the company has real control problems. What he cannot yet see is where the most
              important risk is actually being created and caught.
          globalStep:
            name: "The audit makes John's motive impossible to ignore"
            script: >-
              The SOX findings make John matter, because they prove the control failures are
              not imaginary. But at this point he is still fighting the problem in the only
              way he knows how: push harder, add controls, and demand urgency from inside the
              security silo.

        - type: quote
          id: john-orange-jumpsuits
          modalStep:
            name: "John explains the fear underneath the posture"
            script: >-
              John's abrasive style makes more sense once you hear the motive behind it. He
              is trying to keep executives out of orange jumpsuits. The problem was never that
              he cared too much about risk. The problem was that he had no way to connect risk
              to the actual business system.
          globalStep:
            name: "The tokenization disaster shows the limit of John's model"
            script: >-
              This is where John's arc becomes painful instead of cartoonish. He bypasses the
              normal system to rush tokenization into production, helps trigger a payroll
              disaster, and then learns in the audit meeting that the work was not even in
              scope for SOX. He is chasing risk, but he is not yet tracing where the business
              is actually relying on a control.

        - type: quote
          id: erik-end-to-end-business-process
          modalStep:
            name: "Erik names John's blind spot"
            script: >-
              This is the line that reframes the whole audit story. Erik does not tell John
              that controls are useless. He tells him that without seeing the end-to-end
              business process, John cannot tell which controls are essential, which are
              redundant, and which are solving the wrong problem entirely.
          globalStep:
            name: "The audit lesson becomes visible"
            script: >-
              Later, Finance walks the auditors through the real flow of money and shows that
              even if upstream applications and infrastructure were compromised, material
              errors would still be caught by manual reconciliation controls downstream. That
              is the breakthrough: the company gets the auditors off its back not by claiming
              perfect IT controls, but by proving where the relied-upon controls actually sit.

        - type: challenge
          id: failed-handoffs
          modalStep:
            name: "A forty-five-minute task becomes a multi-week delay"
            script: >-
              Patty traces one of Brent's so-called quick tasks and discovers it involves more
              than twenty steps across six teams. The work itself is short. The waiting is
              enormous. Every handoff adds delay, context loss, and another chance for the
              task to stall.
          globalStep:
            name: "Waiting becomes the real cost"
            script: >-
              Patty's work matters here for the same reason Faye's audit walkthrough matters.
              Both force the company to trace the real path instead of the org chart fantasy.
              In an overloaded system, queue time matters more than touch time, and handoffs
              hide the risk until somebody makes the flow visible.

        - type: quote
          id: bill-wait-time-busy-idle
          modalStep:
            name: "Bill makes the queue math visible"
            script: >-
              This is the cleanest visual summary of what Patty and Bill have just learned.
              Once a person in the chain is near full utilization, work does not slow down a
              little. It waits exponentially longer. So a task that looks like thirty minutes
              of touch time turns into days of lead time because it keeps landing in somebody
              else's queue.
          globalStep:
            name: "Overutilization is why the chain seizes up"
            script: >-
              This is the late-mid lesson the team needed. The problem is not merely that too
              many people are busy. It is that every overloaded handoff magnifies the wait for
              the next one. That is why Brent's quick tasks get stuck, why the whole task
              chain becomes unpredictable, and why protecting capacity matters more than
              keeping every person maximally utilized.

        - type: challenge
          id: deployment-failures
          modalStep:
            name: "Releases still feel like a gamble"
            script: >-
              The team attempts another major Phoenix deployment and once again runs into a
              critical failure late in the game. This time the culprit is an undocumented
              production database change. The lesson is painful: even after all the progress,
              the organisation is still learning too late and in batches that are far too big.
          globalStep:
            name: "Release risk is designed in"
            script: >-
              The important point is not that releases are risky. It is that the system was
              still structured to discover risk at the most expensive possible moment.

        - type: challenge
          id: late-detection
          modalStep:
            name: "Feedback arrives after the damage is done"
            script: >-
              Late detection is what turns ordinary engineering mistakes into executive
              crises. If you only learn that something is broken during payroll, during a big
              release, or during an audit, the blast radius is already enormous.
          globalStep:
            name: "Quality depends on timing"
            script: >-
              Bill learns this lesson the expensive way: through payroll failures, broken
              releases, audit findings, and defects discovered only when the blast radius is
              already huge. That accumulation of pain is what leads him to the next idea:
              quality improves only when feedback loops get shorter, earlier, and harder to
              ignore.

        - type: quote
          id: erik-three-ways
          modalStep:
            name: "Erik gives Bill the frame for what comes next"
            script: >-
              Erik had already told Bill that once he learned to control work at the system
              level, he would be on his way toward understanding the Three Ways. By this point
              in the story, Bill has lived enough failures to hear that lesson properly.
          globalStep:
            name: "The audit story feeds directly into the Second Way"
            script: >-
              John learns to ask where the business truly relies on a control. Bill learns to
              ask how to surface problems sooner and closer to the source. Those are two sides
              of the same insight, and they lead directly into the Second Way.

        - type: character
          id: maggie-lee
          modalStep:
            name: "Maggie brings the market back into the room"
            script: >-
              Maggie Lee represents the business test that keeps all of this honest. She does
              not care how hard IT worked or how many tickets were closed. She cares whether
              the company can reach customers faster than the competition. Her presence keeps
              the conversation tied to outcomes, not effort.
          globalStep:
            name: "Value becomes the scoreboard"
            script: >-
              Maggie matters because she reminds the team that internal improvement only
              counts if it changes what the business can do in the market.

        - type: concept
          id: second-way
          modalStep:
            name: "The Second Way"
            script: >-
              The Second Way is feedback. Build loops that expose problems early, share
              responsibility across teams, and make quality everybody's job. Do not wait for
              production night, audit season, or public embarrassment to learn what the system
              could have told you much earlier.
          globalStep:
            name: "Feedback turns discipline into learning"
            script: >-
              With feedback in place, the organisation can finally improve on purpose instead
              of only learning through outages.

    - id: segment-5
      title: "Automation, Experimentation, and Strategic Ownership"
      subtitle: "Unicorn proves the model, and learning becomes an organisational capability"
      start: "45:00"
      end: "55:00"
      phase: late
      pageScript: >-
        By the end of the book, the change is measurable. Major outages are down, recovery
        is faster, and Brent is almost caught up. But the real question is bigger than
        stability. Can this organisation turn operational improvement into strategic
        advantage?
      contentSetupScript: >-
        The answer comes through automation, safe experimentation, and one final insight:
        if a capability sets the pace of the business, you eventually have to own it.
      narrativeArc: >-
        The ending matters because the team stops treating IT as a cost centre and starts
        treating it as strategic capability.
      takeaway: >-
        High performance comes from automation, safe experimentation, and owning the
        capabilities that set the pace of the business.
      summary: >-
        Unicorn proves the new model in production: smaller batches, automated environments,
        rapid security fixes, and constant experimentation start generating real revenue. The team
        then pushes further by hardening systems through deliberate fault injection and by pulling
        strategic capabilities back in-house when outsourcing becomes the constraint. The ending's
        final point is organizational: IT is not a side function to delegate away when it sets the
        pace of the business.
      reveals:
        - type: epic
          id: unicorn-project
          modalStep:
            name: "Unicorn proves the model"
            script: >-
              Project Unicorn is where the team's hard-won lessons become a repeatable
              delivery capability. Smaller batches, automated environments, and a real
              deployment pipeline finally make it possible to move quickly without gambling the
              company every time code ships.
          globalStep:
            name: "The transformation becomes visible"
            script: >-
              Unicorn matters because it shows the change is not theoretical. The very same
              organisation that used to melt down over releases can now create value with
              speed and confidence.

        - type: quote
          id: steve-flow-forward
          modalStep:
            name: "Steve starts speaking the language of flow"
            script: >-
              One of the clearest signals that the company has changed is that Steve's own
              language changes. He is no longer asking only for speed and deadlines. He is
              starting to recognise waste, rework, and the need for work to move in one
              direction: forward.
          globalStep:
            name: "Leadership has matured"
            script: >-
              That matters because executive behaviour helped create the old system. By the
              end, the CEO sounds like someone who has internalised systems thinking instead
              of just applying pressure.

        - type: challenge
          id: fear-of-failure
          modalStep:
            name: "The team learns to fail safely"
            script: >-
              Near the end of the book, the team starts deliberately breaking things in
              controlled ways to make the platform more resilient. The point is no longer to
              avoid every failure at all costs. The point is to practice, learn, and harden
              the system before reality does it for you.
          globalStep:
            name: "Failure becomes a teacher"
            script: >-
              This is a deep cultural shift. Failure stops being something to hide and starts
              becoming something the team studies and learns from.

        - type: challenge
          id: vendor-lock-in
          modalStep:
            name: "The constraint moves outside IT"
            script: >-
              By the end, the team discovers that one of its biggest strategic constraints is
              not internal at all. It is an outsourced capability that the business now depends
              on for speed. The vendor cannot move fast enough, which means the company cannot
              move fast enough.
          globalStep:
            name: "Strategic capabilities must be owned"
            script: >-
              This is one of the most mature insights in the book. If a capability sets the
              pace of the business, owning it eventually matters.

        - type: challenge
          id: heroics-over-systems
          modalStep:
            name: "Do not celebrate the wrong thing"
            script: >-
              Even now, the temptation remains to celebrate heroes instead of fixing systems.
              Pull Brent into the next emergency, rescue the next project, and tell yourself
              the company is fine because smart people saved it again.
          globalStep:
            name: "Less heroism, more capability"
            script: >-
              By the end, Bill has seen that flow and feedback are still not enough if the
              organisation only improves when disaster forces it to. Unicorn, deliberate
              experiments, and the move away from heroics teach the final lesson: a healthy
              system has to practice learning on purpose, not just survive the next fire.

        - type: concept
          id: third-way
          modalStep:
            name: "The Third Way"
            script: >-
              The Third Way is continual learning and experimentation. Practice failure.
              Run experiments. Hold blameless reviews. Build resilience into the way work
              happens so the organisation gets better every time it encounters stress.
          globalStep:
            name: "Learning becomes a business capability"
            script: >-
              This is the destination of the book. IT stops being a cost centre that the
              business tolerates and becomes a capability the business depends on to win.

    - id: outro
      title: "The Transformation"
      subtitle: "From firefighting to strategic capability"
      start: "55:00"
      end: "60:00"
      phase: outro
      pageScript: >-
        The Phoenix Project is not really a book about servers, tickets, or org charts. It
        is a book about learning to see the system: the flow of work, the constraint, the
        feedback loops, and the culture that determines whether people can improve it. Bill
        Palmer enters the story as a reluctant manager trying to survive the week. He leaves
        it as someone who understands how the business actually runs.
      reveals: []
