segments:
  - segmentId: segment-1
    items:
      - id: segment-1-visibility
        title: "You cannot manage work you cannot see"
        description: >-
          Without a shared view of changes, commitments, and owners, prioritization becomes
          politics and diagnosis becomes guesswork.

      - id: segment-1-business-impact
        title: "Reliability failures are business failures"
        description: >-
          The payroll outage proves an IT failure instantly becomes a crisis for employees,
          finance, executives, and the business.

      - id: segment-1-change-discipline
        title: "Change discipline is a safeguard, not bureaucracy"
        description: >-
          Hidden changes, rushed fixes, and missing controls create secondary failures faster
          than teams can recover from them.

      - id: segment-1-readiness
        title: "A deadline does not make a reckless launch safe"
        description: >-
          Phoenix is pushed forward as a promise to keep, even when Operations knows the
          environments, handoffs, and readiness work are not in place.

      - id: segment-1-governance-debt
        title: "Audit pain exposes governance debt"
        description: >-
          The audit reveals that weak change control, fragile systems, and unclear ownership
          have already become systemic business risk.

      - id: segment-1-trust-collapse
        title: "Lost credibility turns valid warnings into excuses"
        description: >-
          Once IT is seen as slow and untrustworthy, technically correct risk warnings get
          reframed as hesitation or excuse-making. Sarah dismisses Bill's operational
          concerns not because they are wrong but because the track record has already
          decided how they will be received. Credibility is an operational resource —
          once spent, the right advice stops landing.

  - segmentId: segment-2
    items:
      - id: segment-2-demand
        title: "Real demand must be counted before work can be managed"
        description: >-
          Once the workload is counted, Bill sees too many projects and too much break-fix work
          competing for the same people. Every commitment was fiction.

      - id: segment-2-constraint
        title: "A people bottleneck must be protected and taught out of isolation"
        description: >-
          Brent shows that a human bottleneck is not fixed by more interruptions. Bill's answer
          is to gate access, put other engineers behind Brent, and turn every escalation into
          documented knowledge transfer so the system gets smarter instead of more dependent.

      - id: segment-2-change-work
        title: "Changes are real work, not background noise"
        description: >-
          The change board exposes hundreds of hidden changes and makes operational work part
          of the real queue instead of background noise.

      - id: segment-2-wip
        title: "High WIP makes work enter faster than it can leave"
        description: >-
          When only forty percent of changes complete, unfinished work piles up like inventory
          at a bottleneck. Busy is not the same as flowing.

      - id: segment-2-date-pressure
        title: "Date pressure turns known risk into deliberate recklessness"
        description: >-
          Everyone can see Phoenix is not ready, but the launch still moves forward. Risk stops
          being a warning and becomes a cost Operations is forced to absorb.

      - id: segment-2-staffing-value
        title: "Understaffing is part of a larger value-recognition failure"
        description: >-
          The team is genuinely short on capacity, but leadership sees IT first as a cost center.
          Until IT's business value is visible, more staff sounds like overhead.

  - segmentId: segment-3
    items:
      - id: segment-3-unplanned-work
        title: "Unplanned work is anti-work that destroys planned work"
        description: >-
          Phoenix wipes the change board clean and shows that firefighting does not just add
          load. It destroys the work the organization meant to finish.

      - id: segment-3-protect-constraint
        title: "The constraint must be protected from both outages and dependency"
        description: >-
          Brent is overloaded because the system routes knowledge, escalations, and critical
          work through one person. The constraint has to be protected and reduced.

      - id: segment-3-technical-debt
        title: "Technical debt compounds through shortcuts and rework"
        description: >-
          Every shortcut taken to satisfy current demand creates future unplanned work. Soon
          the organization is paying interest instead of delivering useful work.

      - id: segment-3-capacity
        title: "Work should be accepted only after real capacity analysis"
        description: >-
          Erik's plant analogy makes the missing discipline explicit: before accepting work,
          leaders need the equivalent of bills of material, routings, work-center load, and a
          view of whether the new demand would jeopardize existing commitments.

      - id: segment-3-say-no
        title: "Leadership must say no with data, not just instinct"
        description: >-
          The offsite reframes leadership responsibility. IT cannot keep acting like a compliant
          order-taking function. If a project will fail, leaders must say so and support that no
          with demand, capacity, and constraint data the business can evaluate. Erik's screening
          test is explicit: accept work that improves flow, strengthens operational stability or
          recovery, or increases usable capacity at the bottleneck.

      - id: segment-3-freeze
        title: "Stopping intake is sometimes the first act of real control"
        description: >-
          The project freeze is not just a pause. It is the first decision that respects flow,
          reduces WIP, protects existing commitments, and creates space to rebuild sane project
          acceptance rules.

  - segmentId: segment-4
    items:
      - id: segment-4-release-control
        title: "Flow only improves when new work is released deliberately"
        description: >-
          The freeze works, but old priority conflicts will return unless intake, sequencing,
          and release are controlled deliberately.

      - id: segment-4-standardize
        title: "Recurring work must be standardized before it can scale"
        description: >-
          Much IT work is more repetitive than the organization admits. Once steps and
          handoffs are documented, lead times improve and heroics shrink.

      - id: segment-4-handoffs
        title: "Queue time and handoff delay dominate total lead time"
        description: >-
          The Phoenix environment task looks small until it is decomposed. The real delay is not
          touch time but waiting in queues and losing days at handoffs.

      - id: segment-4-business-context
        title: "IT risk must be defined in business terms"
        description: >-
          Outages, bad data, and slow delivery are not just IT defects. They directly damage
          revenue, stockouts, retention, time to market, and return on capital.

      - id: segment-4-scope-controls
        title: "Controls matter only when they protect a real business outcome"
        description: >-
          John's breakthrough is not more security but better scoping. Controls matter only when
          they protect a business outcome the company actually relies on.

      - id: segment-4-feedback-timing
        title: "The later a problem surfaces, the more it costs"
        description: >-
          Problems discovered during payroll runs, major releases, or annual audits have
          already spread into enormous blast radii. Shortening feedback loops — earlier
          testing, tighter monitoring, faster escalation — converts expensive crises into
          cheap corrections. The payroll failure, Phoenix deployment failures, and repeat
          audit findings are all evidence that feedback arrived too late.

  - segmentId: segment-5
    items:
      - id: segment-5-improvement-habit
        title: "Improvement must become part of daily work"
        description: >-
          By the end, the team no longer waits for disaster to justify change. Improvement,
          drills, and experiments become part of daily work.

      - id: segment-5-pipeline
        title: "Fast flow requires environments and deployments to be automated"
        description: >-
          Unicorn works because environments, tests, and deployments stop being artisanal
          handoffs. Once treated like code, they can be rebuilt and released on demand.

      - id: segment-5-small-batches
        title: "Smaller batches create safer releases and faster business learning"
        description: >-
          Unicorn's short cycles and frequent releases generate revenue because they let the
          business learn quickly. Phoenix carried too much WIP for too long.

      - id: segment-5-own-constraint
        title: "If a capability sets business pace, the company must own it"
        description: >-
          The outsourced MRP system becomes a strategic constraint the moment it blocks the
          build-to-order capability the business needs to answer a competitor. The book makes the
          economics painfully concrete: the vendor wants eighteen months and upfront study money
          just to begin, while the business is already losing sales. Outsourced control of a core
          competency is still loss of control, especially when the vendor also controls pace,
          price, and priority.

      - id: segment-5-super-tribe
        title: "High performance comes from a shared business-and-technology tribe"
        description: >-
          The final shift is cultural as much as technical. Development, Operations, Security,
          product, and executives start acting as one system, not separate silos.

      - id: segment-5-deliberate-failure
        title: "Resilience is built by practicing failure, not avoiding it"
        description: >-
          The team starts deliberately injecting failure in controlled ways to harden the
          platform before reality does it for them. The goal shifts from preventing every
          outage to learning faster than the next outage will arrive. Blameless reviews,
          fault injection, and production drills turn failure from something to hide into
          something the organisation studies and gets better at surviving.