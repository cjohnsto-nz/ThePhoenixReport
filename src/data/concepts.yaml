# Concepts - The Four Types of Work and The Three Ways
# Each concept has an id matching the timeline reveals

fourTypesOfWork:
  title: "The Four Types of Work"
  description: "All work in an IT organization falls into one of four categories. Understanding these categories is essential for managing flow and capacity."
  icon: "layers"
  color: "phoenix"
  items:
    - id: four-types-business
      title: "Business Projects"
      subtitle: "Revenue-generating work"
      description: "These are the initiatives that directly support business objectives — new features, products, and services that generate revenue or serve customers. They are typically tracked and visible, but often compete fiercely for constrained resources."
      examples:
        - "The Phoenix Project deployment"
        - "New customer-facing features"
        - "Revenue-driving product launches"
      icon: "briefcase"
      color: "#3668fc"

    - id: four-types-internal
      title: "Internal IT Projects"
      subtitle: "Infrastructure and internal improvements"
      description: "Work generated by business projects — infrastructure migrations, tooling improvements, automation efforts. These are often invisible to the business but critical for sustaining the ability to deliver business projects."
      examples:
        - "Server migrations"
        - "Database upgrades"
        - "Internal tooling improvements"
      icon: "server"
      color: "#8b5cf6"

    - id: four-types-changes
      title: "Changes"
      subtitle: "Routine operational changes"
      description: "The day-to-day modifications required to keep systems running — patches, configuration changes, deployments. When poorly managed, changes become a major source of unplanned work and outages."
      examples:
        - "Security patches"
        - "Configuration updates"
        - "Routine deployments"
      icon: "refresh"
      color: "#06b6d4"

    - id: four-types-unplanned
      title: "Unplanned Work"
      subtitle: "The silent killer of productivity"
      description: "Recovery work caused by incidents, outages, and failures. Unplanned work is the most destructive type — it displaces all other planned work, creates chaos, and is often caused by the other three types of work being poorly managed."
      examples:
        - "Emergency incident response"
        - "Unexpected outages"
        - "Firefighting and escalations"
      icon: "alert-triangle"
      color: "#ef4444"

threeWays:
  title: "The Three Ways"
  description: "The Three Ways are the principles that all DevOps patterns can be derived from. They describe the values and philosophies that guide processes, procedures, and practices."
  icon: "compass"
  color: "ember"
  items:
    - id: first-way
      title: "The First Way"
      subtitle: "Flow"
      description: "The First Way emphasizes the performance of the entire system — the flow of work from Development to Operations to the customer. It focuses on making work visible, reducing batch sizes, reducing work-in-progress, and never passing a known defect downstream."
      icon: "arrow-right"
      color: "#3668fc"
      principles:
        - id: first-way-manage-system
          title: "Manage the System"
          description: "Optimize for the whole, not individual silos. Local optimizations that don't improve the global flow are an illusion of progress."
          icon: "grid"

        # - id: first-way-protect-bottlenecks
        #   title: "Protect Bottlenecks"
        #   description: "Identify and protect the constraint. Any improvement not at the bottleneck is a mirage. Ensure the constraint is never idle and never overloaded with non-critical work."
        #   icon: "shield"

        # - id: first-way-reduce-wip
        #   title: "Reduce Work-in-Progress"
        #   description: "Limiting WIP is the key to improving flow. The more work in the system, the longer everything takes. Small batches move faster."
        #   icon: "minimize"

        # - id: first-way-optimize-flow
        #   title: "Optimize Flow"
        #   description: "Optimize for the smooth, fast flow of work across the entire value stream — from idea to customer value."
        #   icon: "zap"

    - id: second-way
      title: "The Second Way"
      subtitle: "Feedback"
      description: "The Second Way is about creating ever-tighter feedback loops — fast, constant, and amplified at every stage. The goal is to understand and respond to all customers, internal and external, and to shorten and amplify feedback loops."
      icon: "repeat"
      color: "#f06a07"
      principles:
        - id: second-way-feedback-loops
          title: "Fast Feedback Loops"
          description: "Create fast feedback at every stage of the value stream. Problems detected early are exponentially cheaper to fix than those found late."
          icon: "message-circle"

        - id: second-way-early-detection
          title: "Early Detection of Defects"
          description: "Build quality in rather than inspecting it out. Automated testing, monitoring, and telemetry catch issues before they reach production."
          icon: "search"

        - id: second-way-shared-responsibility
          title: "Shared Responsibility"
          description: "Everyone owns the outcome. Development and Operations share responsibility for deployments, quality, and customer satisfaction."
          icon: "users"

    - id: third-way
      title: "The Third Way"
      subtitle: "Continuous Learning"
      description: "The Third Way is about creating a culture of continual experimentation, taking risks and learning from failure, and understanding that repetition and practice are the prerequisite to mastery."
      icon: "book-open"
      color: "#10b981"
      principles:
        - id: third-way-experimentation
          title: "Experimentation & Improvement"
          description: "Allocate time for experimentation and improvement. Innovation requires the courage to try new things and the safety to fail."
          icon: "beaker"

        - id: third-way-blameless
          title: "Blameless Postmortems"
          description: "When things go wrong, focus on the system, not the person. Blameless culture encourages reporting and learning rather than hiding and blaming."
          icon: "heart"

        - id: third-way-resilience
          title: "Invest in Resilience"
          description: "Build capability, invest in infrastructure, and strengthen the system so it can absorb shocks and adapt to change."
          icon: "anchor"


